 from contamination-driven impacts.\n  </p>\n  <p>\n    The pipeline processes <strong>310 sites</strong> with complete data across three matrices:\n  </p>\n\n  <div class=\"matrix-table\">\n    <table>\n      <thead>\n        <tr><th>Data Matrix</th><th>Symbol</th><th>Dimension</th><th>Units</th></tr>\n      </thead>\n      <tbody>\n        <tr><td>Environmental</td><td><strong>E</strong></td><td>310 &times; 6</td><td>mixed</td></tr>\n        <tr><td>Chemical</td><td><strong>M</strong></td><td>310 &times; 16</td><td>mixed</td></tr>\n        <tr><td>Taxa</td><td><strong>T</strong></td><td>310 &times; 16</td><td>octave</td></tr>\n      </tbody>\n    </table>\n  </div>\n\n  <p>\n    This website documents the research skeleton&mdash;the logical structure, data flow,\n    and computational frameworks that organize each chapter of the thesis.\n    Additional pages detailing the implementation of each computation will be added over time.\n  </p>\n</div>"}, {"cell_type": "markdown", "source": "## Objectives:\n\n\n<div style=\"width: 80%; max-width: 700px; margin: 0 auto;\">\n  <img src=\"images/c1_breakpoints_detection.png\" alt=\"Idea Concordant Sites\" style=\"width: 100%; display: block;\">\n  <p style=\"margin-top: 8px;\"><em>\n Waiting to update.\n</div>\n\n<div align=\"center\">"}, {"cell_type": "markdown", "source": "<h2 style=\"text-align:center; border:none; font-size:1.2rem; color:var(--muted); margin-bottom:24px;\">Sections</h2>\n\n<div class=\"section-grid\">\n\n\n  <a href=\"data-preparation.html\" class=\"section-card\">\n    <span class=\"card-label\">Data Foundation</span>\n    <h3>Data Preparation</h3>\n    <p>Merging environmental, chemical, and taxa data into a unified 310-site dataset using shared site identifiers.</p>\n    <div class=\"card-footer\">\n      <span class=\"badge badge-complete\">Complete</span>\n      <span class=\"read-more\">Read &rarr;</span>\n    </div>\n  </a>\n\n  <a href=\"architecture.html\" class=\"section-card\">\n    <span class=\"card-label\">Methodology</span>\n    <h3>Architecture</h3>\n    <p>The three-level thesis architecture that connects chapter goals, framework design, and computation processes.</p>\n    <div class=\"card-footer\">\n      <span class=\"badge badge-complete\">Complete</span>\n      <span class=\"read-more\">Read &rarr;</span>\n    </div>\n  </a>\n\n  <a href=\"chapter2.html\" class=\"section-card\">\n    <span class=\"card-label\">Chapter 2</span>\n    <h3>Pollution Assessment</h3>\n    <p>PCA-based contamination stressor extraction and ranked subset-RDA sweep to identify least-polluted reference sites.</p>\n    <div class=\"card-footer\">\n      <span class=\"badge badge-complete\">Complete</span>\n      <span class=\"read-more\">Read &rarr;</span>\n    </div>\n  </a>\n\n  <a href=\"chapter3.html\" class=\"section-card\">\n    <span class=\"card-label\">Chapter 3</span>\n    <h3>Environmental Standardization</h3>\n    <p>Reference community typology, habitat-based classification, and environmental standardization of community composition.</p>\n    <div class=\"card-footer\">\n      <span class=\"badge badge-progress\">In Progress</span>\n      <span class=\"read-more\">Read &rarr;</span>\n    </div>\n  </a>\n\n  <a href=\"chapter4.html\" class=\"section-card\">\n    <span class=\"card-label\">Chapter 4</span>\n    <h3>ZCI Ordination</h3>\n    <p>Bray-Curtis community ordination and ZCI construction for assessing zoobenthic community composition.</p>\n    <div class=\"card-footer\">\n      <span class=\"badge badge-progress\">In Progress</span>\n      <span class=\"read-more\">Read &rarr;</span>\n    </div>\n  </a>\n\n\n  <a href=\"chapter5.html\" class=\"section-card\">\n    <span class=\"card-label\">Chapter 5</span>\n    <h3>Chapter 5</h3>\n    <p></p>\n    <div class=\"card-footer\">\n      <span class=\"badge badge-progress\">Planned</span>\n      <span class=\"read-more\">Read &rarr;</span>\n    </div>\n  </a>\n\n  <a href=\"chapter6.html\" class=\"section
