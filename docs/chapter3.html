  <script>
    window.PAGE_ID = "chapter3";
    window.cells = [{"cell_type": "markdown", "source": "# Chapter 3: Environmental Standardization of Zoobenthic Community Composition Using Reference-Site Taxa Clusters\n\n\nThis main objective of chapter three is to **control environmental confounding** in zoobenthic community composition.\n\nFirst, reference community types are identified from taxa composition at least-stressed sites. Second, their associated environmental conditions are modeled with a classifier. Third, the classifier is applied to all sites to assign each site to an **expected** reference community type based on its environmental descriptor space. \n\nThese steps indirectly partitions environmental space into (K) reference-community regions. Although this discretizes continuous environmental gradients, it improves interpretability with environmentally comparable groups."}, {"cell_type": "markdown", "source": "## Framework 1: Reference Community Typology from Least-Stressed Sites\n\n\nTo define naturally occurring community types without imposing environmental variables on the clustering process, an **unconstrained** taxa-based clustering was first applied to the least-stressed sites. The resulting reference community types were then used as **response** labels in an environmental classifier."}, {"cell_type": "markdown", "source": "\n**Question/Motivation**:\n\nIt risks collinearity and loss of interpretability to crunch the environmental covariates together with the stressors into a regression model. Instead, we want the bioassessment idea of comparing observed communities with\nexpected reference conditions with similar environmental conditions.\n\nReference communities can have distinct environmental conditions but **are not** defined by them, because contamination can be found in any environmental context. \nReference communities **should be** described by taxa compositions where contamination is least likely to have shaped community composition, which are the sites with lowest contamination levels.\n\n\n\n**Validation Method**:\n\nPick out the $m$ least-stressed sites based on ranking by the $f_{sum}()$ scores, and apply an unconstrained hierarchical clustering to their taxa matrix $\\mathbf{T_{ref}}$. Within the resulting dendrogram, supply statistical evidences to decide how many clusters to retain for cluster **robustness** and **distinctiveness**.\n\n\n\n\n**Inputs**:\n1. metadata: taxa data $\\mathbf{T}$\n2. artifacts:\n   - table: PC scores together with $f_{sum}()$ and $f_{max}()$ scores\n\n**Process**:\n1. transformations: none, $\\mathbf{T}$ was already in octave format\n2. bridging tools: rank-based subset selector\n3. modeling: Ward's hierarchical clustering, Node-wise ANOVA, ANOVA, pvclust bootstrap resampling, \n4. interpreters: cluster dendrogram with $k$ finalized colors,\nnode-wise ANOVA results, ANOVA results, approximately unbiased (AU) p-values from pvclust,\n\n\n\n**Outputs**:\n1. results:\n   - tables:\n      - Selected $k$ cluster labels for the $m$ least-stressed sites\n        - rows: $(\\text{Integrated Code}, \\text{Cluster Label})$ \n        - shape: $(m, 2)$\n      \n      - Node-wise ANOVA results for the first $k+1$ bifurcation nodes in the dendrogram\n        - rows: $(\\text{Splits}, \\text{left-size}, \\text{right-size}, \\text{Taxon}, \\text{Left mean},\n         \\text{Right mean}, \\text{F-statistic}, \\text{p-value}, \\text{FDR p-value})$\n        - shape: $((k+1) \\times n_{k_\\text{sig taxa}}, 9)$\n\n      - ANOVA results for the $k$ clusters\n        - rows: $(\\text{Taxon}, \\text{SS Between(df)}, \\text{SS Within(df)}, \\text{F-statistic}, \\text{p-value},\n          \\bar{x}_{C_1}, ..., \\bar{x}_{C_k})$\n        - shape: $(16, 5 + k)$\n      \n      - pvclust approxiamte unbiased (AU) p-values for $k$ clusters\n        - rows: $(\\text{Cluster Label}, \\text{AU p-value})$\n        - shape: $(k, 2)$\n   \n   - figures:\n      - Dendrogram of hierarchical clustering.\n        - x-axis: distance between clusters\n        - y-axis: site labels and leaves colored by $k$ cluster labels\n        - legend: colors for $k$ clusters, AU p-values for $k$ clusters\n      - Barplots of the 16 taxa concentrations across the $k$ clusters.\n        - x-axis: 16 ticks for 16 taxa, each tick holds $k$ bars for $k$ clusters\n        - y-axis: means of relative concentration $p_{jk}$ of each taxon $j$ in each cluster $k$\n        - legend: colors for $k$ clusters\n        - anotations: asterisks for significant taxa across the three clusters\n\n2. artifacts: \n   - table:\n     - Selected $k$ cluster labels for the $m$ least-stressed sites\n         - rows: $(\\text{Integrated Code}, \\text{Cluster Label})$ \n         - shape: $(m, 2)$\n\n**Demo Outputs**:\n\n<div style=\"width: 50%; max-width: 700px; margin: 0 auto;\">\n  <img src=\"images/ward_dendrogram.png\" alt=\"Ward Dendrogram with AUs\" style=\"width: 100%; display: block;\">\n  <p style=\"margin-top: 8px;\"><em>Figure: Ward Dendrogram with Approximately Unbiased (AU) p-values for the 3 clusters.</em></p>\n</div>"}, {"cell_type": "markdown", "source": "## Framework 2: Taxa\u2013Environment Concordance-Based Classifier Training\n\n**If sites are clustered by environmental descriptors, do they tend to group with sites from the same taxa-defined cluster?**\n\n\n**Background**\n\nReference cluster labels are defined from unconstrained clustering in taxa space and are used as response classes for training an environmental classifier. However, taxa-defined clusters are not necessarily well separated in environmental space. Some sites assigned to $C_i$ may have environmental profiles closer to sites in $C_j$, suggesting that the measured environmental descriptors cannot fully distinguish the taxa clusters.\n\nIf all sites are used equally in classifier training, the model may be forced to learn from sites where taxa labels and environmental features are not concordant. In that case, classifier performance becomes harder to interpret.\n\n**Target**\n\nThis framework identifies sites whose cluster membership is supported in both taxa space and environmental space. Using resampling-based consensus clustering, each site receives a taxa-margin and an environment-margin, defined as the difference between its co-assignment frequency with its own cluster and its strongest alternative cluster.\n\nSites with positive margins in both spaces are treated as **taxa\u2013environment concordant sites**. These sites are used as the primary training set for the environmental classifier because their taxa-defined labels are also supported by environmental similarity."}, {"cell_type": "markdown", "source": "<div style=\"width: 80%; max-width: 700px; margin: 0 auto;\">\n  <img src=\"images/idea_concordant_sites2.png\" alt=\"Idea Concordant Sites\" style=\"width: 100%; display: block;\">\n  <p style=\"margin-top: 8px;\"><em>\n  Conceptual illustration of taxa\u2013environment concordance for classifier training. \n  \n  Left: a taxa-defined cluster $C_i$ may become more dispersed when projected into environmental descriptor space, indicating that not all taxa-cluster members are environmentally coherent. Concordant sites are the intersection of taxa-stable and environment-stable sites within $C_i$.\n    \n  Right: applying this criterion across all 3 clusters identifies core sites whose taxa membership is supported by environmental similarity. These concordant sites provide the most reliable training cases for modeling the mapping from environmental descriptors to reference community types.</em></p>\n</div>"}, {"cell_type": "markdown", "source": "**Question/Motivation**:\n\nSome reference sites may not be concordant between their taxa-defined cluster labels and their environmental similarity. Therefore, concordant sites need to be identified and used as the primary training set. Using these sites, LDA and MRT are compared, and the better classifier is selected to assign expected reference community types to all sites from their environmental profiles.\n\n**Methods and Steps**:\n\nFinalized taxa clusters are used as anchor groups to define each site\u2019s siblings and non-siblings. Consensus clustering is run separately in taxa space and environmental space, producing two co-assignment matrices that\nquantify the frequency with which each site is co-assigned with its own cluster siblings and with other clusters non-siblings across resampling iterations.\n\nFor each site, a margin is calculated as:\n\n$$\n\\text{margin of site } i_{\\in C_j} = \\text{co-assignment with siblings}_{\\in C_j} - \\text{strongest co-assignment with non-siblings}_{\\in C_k, k \\neq j}\n$$\n\nSites with non-negative margins in both spaces are defined as **taxa\u2013environment concordant sites**. The other margin combinations are kept for interpretation as atypical, ambiguous, or weakly supported cases.\n\nLDA and MRT are trained on the concordant sites. Their performance is compared using resampling-based cross-validation, full-training accuracy, and confusion matrices. The selected classifier is then applied to all sites to assign expected reference community types.\n\n\n\n**Inputs**:\n1. metadata: environmental data $\\mathbf{E}$, taxa data $\\mathbf{T}$\n2. artifacts:\n    - table: selected $k (k=3)$ cluster labels for the $m$ least-stressed sites\n      - rows: $(\\text{Integrated Code}, \\text{Cluster Label})$\n      - shape: $(m, 2)$ \n\n**Process**:\n1. transformations: z-score standardization\n2. bridging tools: rank-based subset selector, cross-classification tool (Cartesian product)\n3. modeling: Ward's Hierarchical Clustering, Consensus Clustering, Linear Discriminant Analysis (LDA), Multivariate Regression Trees (MRT)\n4. interpreters: stratified confusion matrices, confusion matrix by random-split cross-validation\n\n\n**Outputs**:\n1. results:\n    - table 1: stratified confusion matrix for LDA trained with concordant sites\n      - rows: $(\\text{env status}_i \\times \\text{taxa status}_i, \\text{env status}_i \\times \\text{taxa status}_j,), i, j \\in \\{1, 2\\}$\n      - shape: $(2, 2)$\n      \n      It has confusion matrix as its elements at each place as follows:\n\n        - rows: $(\\hat i \\in C_1, \\hat i \\in C_2, \\hat i \\in C_3) | i \\in C_i$\n        - shape: $(3, 3)$\n\n    - table 2: stratified confusion matrix for LDA trained with all ref-sites\n      - rows: $(\\text{env status}_i \\times \\text{taxa status}_i, \\text{env status}_i \\times \\text{taxa status}_j,), i, j \\in \\{1, 2\\}$\n      - shape: $(2, 2)$\n      \n      It has confusion matrix as its elements at each place as follows:\n\n        - rows: $(\\hat i \\in C_1, \\hat i \\in C_2, \\hat i \\in C_3) | i \\in C_i$\n        - shape: $(3, 3)$\n        \n    \n    - table 3 : comparison of random-split cv confusion matrices for LDA trained with different sites\n      - rows: $(\\text{data type} ,\\hat i \\in C_1, \\hat i \\in C_2, \\hat i \\in C_3) | i \\in C_i$\n      - shape: $(2 \\times 3, 3)$\n\n2. artifacts: \n   - model: a finalized classifier trained with concordant sites, ready to partition the environmental space into expected reference community types"}, {"cell_type": "markdown", "source": "\n**Demo Outputs**:\n\n<div style=\"width: 60%; max-width: 700px; margin: 0 auto;\">\n  <img src=\"images/consensus_margin_scatter2.png\" alt=\"Idea Concordant Sites\" style=\"width: 100%; display: block;\">\n  <p style=\"margin-top: 8px;\"><em>\n to do caption\n</div>\n\n<div align=\"center\">\n\n<div style=\"width:85%; text-align:left; font-size:13px; margin-bottom:8px;\">\n  <b>Table: </b> Stratified confusion matrix of classifier predictions under taxa-margin and environmental-margin status combinations. Rows are grouped by environmental margin status, columns are grouped by taxa margin status, and accuracy is reported separately within each taxa\u2013environment margin category.\n</div>\n\n<table style=\"width:85%; border-collapse:collapse; text-align:center; font-size:13px;\">\n<thead>\n<tr style=\"border-top:3px solid black;\">\n<td rowspan=\"2\" style=\"padding:10px; border-bottom:3px solid black;\"><b>Env-/Taxa- <br>Margin Status</b></td>\n<td rowspan=\"2\" style=\"padding:10px; border-bottom:3px solid black;\"><b>True/Pred</b></td>\n<td colspan=\"3\" style=\"padding:10px; border-bottom:1px solid black;\"><b>Non-negative Taxa Margin</b></td>\n<td colspan=\"3\" style=\"padding:10px; border-bottom:1px solid black;\"><b>Negative Taxa Margin</b></td>\n</tr>\n<tr style=\"border-bottom:3px solid black;\">\n<td style=\"padding:10px;\">Cluster C<sub>1</sub></td>\n<td style=\"padding:10px;\">Cluster C<sub>2</sub></td>\n<td style=\"padding:10px;\">Cluster C<sub>3</sub></td>\n<td style=\"padding:10px;\">Cluster C<sub>1</sub></td>\n<td style=\"padding:10px;\">Cluster C<sub>2</sub></td>\n<td style=\"padding:10px;\">Cluster C<sub>3</sub></td>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td rowspan=\"4\" style=\"padding:10px; vertical-align:middle;\"><b>Non-negative<br>Env Margin</b></td>\n<td style=\"padding:8px;\">Cluster C<sub>1</sub></td>\n<td>5</td><td>0</td><td>0</td>\n<td>0</td><td>0</td><td>0</td>\n</tr>\n<tr>\n<td style=\"padding:8px;\">Cluster C<sub>2</sub></td>\n<td>0</td><td>12</td><td>2</td>\n<td>0</td><td>0</td><td>0</td>\n</tr>\n<tr>\n<td style=\"padding:8px;\">Cluster C<sub>3</sub></td>\n<td>0</td><td>1</td><td>14</td>\n<td>0</td><td>0</td><td>1</td>\n</tr>\n<tr style=\"border-bottom:3px solid black;\">\n<td style=\"padding:8px;\"><b>Accuracy</b></td>\n<td colspan=\"3\"><b>91% (n=34)</b></td>\n<td colspan=\"3\"><b>100% (n=1)</b></td>\n</tr>\n<tr>\n<td rowspan=\"4\" style=\"padding:10px; vertical-align:middle;\"><b>Negative<br>Env Margin</b></td>\n<td style=\"padding:8px;\">Cluster C<sub>1</sub></td>\n<td>0</td><td>3</td><td>1</td>\n<td>0</td><td>0</td><td>0</td>\n</tr>\n<tr>\n<td style=\"padding:8px;\">Cluster C<sub>2</sub></td>\n<td>1</td><td>2</td><td>19</td>\n<td>0</td><td>0</td><td>0</td>\n</tr>\n<tr>\n<td style=\"padding:8px;\">Cluster C<sub>3</sub></td>\n<td>1</td><td>0</td><td>0</td>\n<td>0</td><td>0</td><td>0</td>\n</tr>\n<tr style=\"border-bottom:3px solid black;\">\n<td style=\"padding:8px;\"><b>Accuracy</b></td>\n<td colspan=\"3\"><b>7% (n=27)</b></td>\n<td colspan=\"3\"><b>n=0</b></td>\n</tr>\n</tbody>\n</table>\n</div>"}, {"cell_type": "markdown", "source": "## Framework 3: Partitioning Environmental Space into Expected Reference Community Typologies\n\n**Guiding question**\n\n**Given a site\u2019s environmental conditions, which reference community type would be expected in the absence of strong contamination?**\n\n**Background**\n\nThe trained environmental classifier links measured environmental descriptors to the reference community types defined in Framework 1. Once trained, the classifier can be applied to all sites, **regardless** of contamination level, to assign each site to an expected reference community type based on its position in environmental descriptor space. In this way, the environmental space is partitioned into 3 ($k=3$) regions, each corresponding to one reference community typology.\n\nFor LDA, these regions are separated by linear decision **boundaries**. Each boundary can be a vector that collects certain values of environmental conditions where the predicted reference community type changes from one class to another. Sites located far from a boundary have more certain assignments, whereas sites located near a boundary have more uncertain assignments. This uncertainty can be quantified using the posterior probabilities produced by LDA. When a site lies close to a boundary, two or more classes may have similar posterior probabilities, indicating that the site occupies a transitional position between expected community types.\n\nWith a flexible interpretation of site membership, sites with similar posterior probabilities for multiple classes can be treated as ambiguous or transitional cases. This acknowledges that some sites may occur near ecological transition zones between reference community typologies. Although this increases the complexity of later analysis, it may better reflect ecological continuity in environmental gradients.\n\nVisualizing these decision regions can help interpret how environmental descriptors structure the expected community typologies. Because the full environmental descriptor space is multidimensional, dimension-reduction methods such as PCA can be used to display the main environmental gradients on a two-dimensional plane. The classifier boundaries or predicted class regions can then be overlaid on this reduced environmental space to support interpretation.\n\n\n**Target**\n\nThe objective of this framework is to interpret the environmental space into regions of expected reference community typologies, then assign each site to its expected reference community type(s) regardless of its contamination level.\n\nVisualize the classifier decision boundaries together with the concordant sites, discussing how these concordant sites decided this interpretation from environmental regions to expected community types."}, {"cell_type": "markdown", "source": "**Inputs**:\n\n1. metadata: environmental data $\\mathbf{E}$\n2. artifacts:\n   - model: a finalized classifier trained with concordant sites\n\n**Process**:\n1. transformations: z-score standardization, ordination (PCA) for visualization of 2D\n2. bridging tools: combination selector\n3. modeling: application of the trained classifier to all sites, PCA on environmental descriptors for ordination axes for visualization\n4. interpreters: decision boundaries in environmental ordination space\n\n**Outputs**:\n1. results:\n    \n    - figure 1: environmental decision boundaries in ($PC_1, PC_2$) ordination space, conditional on means of rest PCs.\n      - x-axis: PC axis 1\n      - y-axis: PC axis 2\n      - points: concordant sites colored by their taxa cluster labels\n      - legend: colors for concordant sites of 3 different clusters\n      \n    - figure 2: environmental decision boundaries in ($PC_1, PC_3$) ordination space, conditional on means of rest PCs.\n      - x-axis: PC axis 1\n      - y-axis: PC axis 3\n      - points: concordant sites colored by their taxa cluster labels\n      - legend: colors for concordant sites of 3 different clusters\n      \n    - figure 3: environmental decision boundaries in ($PC_2, PC_3$) ordination space, conditional on means of rest PCs.\n      - x-axis: PC axis 2\n      - y-axis: PC axis 3\n      - points: concordant sites colored by their taxa cluster labels\n      - legend: colors for concordant sites of 3 different clusters\n      \n2. artifacts: \n   - table 1: expected reference community type(s) for each site based on its environmental profile\n      - rows: $(\\text{Integrated Code}, P_{i, posterior} = C_1, P_{i, posterior} = C_2, P_{i, posterior} = C_3)$\n      - shape: $(310, 4)$ \n\n**Demo Outputs**:\n\n\n<div style=\"width: 80%; max-width: 700px; margin: 0 auto;\">\n  <img src=\"images/ch3_pc123_ordination_projection.png\" alt=\"Idea Concordant Sites\" style=\"width: 100%; display: block;\">\n  <p style=\"margin-top: 8px;\"><em>\n to do caption\n</div>\n\n<div align=\"center\">"}];
  </script>
