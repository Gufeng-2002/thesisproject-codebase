  <script>
    window.PAGE_ID = "gallery";
    window.cells = [{"cell_type": "markdown", "source": "# Gallery\n\nThis section exhibits figures and tables that are generated by computation processes in the chapters and will be discussed in the formal thesis document.\n\nThese outputs are chronologically showcased by chapters and frameworks, explanatory captions are provided below each item.\nSome supplementary words are put around items to provide context and necessary informatoin, but the overall words are kept minimal for a brief overview of the results."}, {"cell_type": "markdown", "source": "## Chapter 2 \u2014 Sediment Contamination Assessment and Screening for Sites with Minimal Contamination Effects on Taxa Composition\n\nChapter 2 assigns each of the 310 sites a comparable contamination measure built from 16 chemical variables, then uses it to identify a least-polluted reference subset for downstream community analysis. Two frameworks deliver this: one constructs the contamination stressors and scores, the other validates the selected reference sites."}, {"cell_type": "markdown", "source": "### Contamination assessment from chemical data\n\nReduces the 16 chemicals into rotated PCA stressors and combines them into per-site contamination scores with different views to compare in ranking and selecting the least-polluted candidates."}, {"cell_type": "markdown", "source": "Starting with the chemical data matrix $\\mathbf{M}_{(311 \\times 16)}$, each chemical variable is log-transformed to reduce the influence of extreme raw records. The transformed matrix is then converted into a correlation matrix $\\mathbf{cor}_{(16 \\times 16)}$, a similarity matrix among variables that implicitly standardizes their raw scales.\n\nPCA decomposes $\\mathbf{cor}_{(16 \\times 16)}$ to derive new component axes as linear combinations of the original chemical variables. These axes are orthogonal and summarize the main inter-chemical correlation structure. Each chemical variable is represented by its loadings on these axes, forming the PCA loading matrix.\n\nFurther quartimax rotation post-processes the retained PCA loading matrix by multiplying it with an optimized orthogonal rotation matrix. This reorients the retained component axes within the same component space and produces a rotated loading matrix with a simpler, more interpretable chemical-loading pattern.\n\n$$\n\\mathbf{M}_{(311 \\times 16)} \\xrightarrow{log_{10}(x + 1) \\text{ } \\& \\text{ cor}} \\mathbf{cor}_{(16 \\times 16)} \\xrightarrow{\\text{PCA } \\& \\text{ loading rotation}} \\mathbf{PC} \\text{ } \\mathbf{loadings}_{(16 \\times 5)}\n$$"}, {"cell_type": "markdown", "source": "<div style=\"width: 80%; max-width: 700px; margin: 0 auto;\">\n\n*Table 1: Quartimax-rotated contaminant loadings from applying PCA on correlation matrix of log-transformed chemical concentration matrix. Raw chemicals that have similar high loadings over component(s) indicates potential common source(s) referenced to by that component(s).*\n\n<div class='gallery-table-block'>\n<div class='table-wrapper'>\n<style>\n.gallery-result-table.gallery-result-table--loadings th:first-child, .gallery-result-table.gallery-result-table--loadings td:first-child { text-align: center; }\n.gallery-result-table.gallery-result-table--loadings th:not(:first-child), .gallery-result-table.gallery-result-table--loadings td:not(:first-child) { text-align: right; font-variant-numeric: tabular-nums; font-feature-settings: 'tnum' 1; white-space: nowrap; }\n.gallery-result-table.gallery-result-table--loadings tbody tr.loading-row td { border-bottom: 0; }\n.gallery-result-table.gallery-result-table--loadings tbody tr.separator-after td { border-bottom: 1px solid var(--rule); }\n.gallery-result-table.gallery-result-table--loadings tbody tr.separator-strong-after td { border-bottom: 3px solid var(--ink); }\n</style>\n<table class='gallery-result-table gallery-result-table--loadings' style=\"border-collapse: collapse;\">\n<thead>\n<tr>\n  <th style=\"border-left: none; border-right: none;\">Chemical</th>\n  <th style=\"border-left: none; border-right: none;\">PC<sub>1</sub></th>\n  <th style=\"border-left: none; border-right: none;\">PC<sub>2</sub></th>\n  <th style=\"border-left: none; border-right: none;\">PC<sub>3</sub></th>\n  <th style=\"border-left: none; border-right: none;\">PC<sub>4</sub></th>\n  <th style=\"border-left: none; border-right: none;\">PC<sub>5</sub></th>\n</tr>\n</thead>\n<tbody>\n<tr class='loading-row'><td style=\"border-left: none; border-right: none;\">Cr</td><td style=\"border-left: none; border-right: none;\"><strong>0.9326</strong></td><td style=\"border-left: none; border-right: none;\">0.1851</td><td style=\"border-left: none; border-right: none;\">0.1337</td><td style=\"border-left: none; border-right: none;\">-0.0357</td><td style=\"border-left: none; border-right: none;\">-0.0001</td></tr>\n<tr class='loading-row'><td style=\"border-left: none; border-right: none;\">Cu</td><td style=\"border-left: none; border-right: none;\"><strong>0.8879</strong></td><td style=\"border-left: none; border-right: none;\">0.1479</td><td style=\"border-left: none; border-right: none;\">0.1044</td><td style=\"border-left: none; border-right: none;\">-0.1005</td><td style=\"border-left: none; border-right: none;\">0.0409</td></tr>\n<tr class='loading-row'><td style=\"border-left: none; border-right: none;\">Zn</td><td style=\"border-left: none; border-right: none;\"><strong>0.8862</strong></td><td style=\"border-left: none; border-right: none;\">-0.0884</td><td style=\"border-left: none; border-right: none;\">-0.0170</td><td style=\"border-left: none; border-right: none;\">-0.0427</td><td style=\"border-left: none; border-right: none;\">0.1072</td></tr>\n<tr class='loading-row'><td style=\"border-left: none; border-right: none;\">Ni</td><td style=\"border-left: none; border-right: none;\"><strong>0.8799</strong></td><td style=\"border-left: none; border-right: none;\">0.0911</td><td style=\"border-left: none; border-rig "border-left: none; border-right: none;\"><strong>0.5612</strong></td><td style=\"border-left: none; border-right: none;\">0.3671</td><td style=\"border-left: none; border-right: none;\">0.0183</td><td style=\"border-left: none; border-right: none;\">0.0517</td><td style=\"border-left: none; border-right: none;\">0.0847</td></tr>\n\n<tr class='loading-row'><td style=\"border-left: none; border-right: none;\">Ca</td><td style=\"border-left: none; border-right: none;\">0.2610</td><td style=\"border-left: none; border-right: none;\"><strong>0.6861</strong></td><td style=\"border-left: none; border-right: none;\">0.0214</td><td style=\"border-left: none; border-right: none;\">0.3127</td><td style=\"border-left: none; border-right: none;\">0.0004</td></tr>\n<tr class='loading-row'><td style=\"border-left: none; border-right: none;\">Al</td><td style=\"border-left: none; border-right: none;\">0.5224</td><td style=\"border-left: none; border-right: none;\"><strong>0.6635</strong></td><td style=\"border-left: none; border-right: none;\">-0.0114</td><td style=\"border-left: none; border-right: none;\">-0.0883</td><td style=\"border-left: none; border-right: none;\">0.3831</td></tr>\n<tr class='loading-row separator-after'><td style=\"border-left: none; border-right: none;\">Mn</td><td style=\"border-left: none; border-right: none;\">0.5364</td><td style=\"border-left: none; border-right: none;\"><strong>0.6269</strong></td><td style=\"border-left: none; border-right: none;\">0.3278</td><td style=\"border-left: none; border-right: none;\">0.1314</td><td style=\"border-left: none; border-right: none;\">-0.2374</td></tr>\n\n<tr class='loading-row'><td style=\"border-left: none; border-right: none;\">Pb</td><td style=\"border-left: none; border-right: none;\">0.3767</td><td style=\"border-left: none; border-right: none;\">0.1161</td><td style=\"border-left: none; border-right: none;\"><strong>0.7972</strong></td><td style=\"border-left: none; border-right: none;\">-0.0003</td><td style=\"border-left: none; border-right: none;\">-0.3165</td></tr>\n<tr class='loading-row separator-after'><td style=\"border-left: none; border-right: none;\">As</td><td style=\"border-left: none; border-right: none;\">0.3276</td><td style=\"border-left: none; border-right: none;\">0.0257</td><td style=\"border-left: none; border-right: none;\"><strong>0.7874</strong></td><td style=\"border-left: none; border-right: none;\">-0.0112</td><td style=\"border-left: none; border-right: none;\">0.3650</td></tr>\n\n<tr class='loading-row separator-after'><td style=\"border-left: none; border-right: none;\">OCS</td><td style=\"border-left: none; border-right: none;\">0.1851</td><td style=\"border-left: none; border-right: none;\">0.1178</td><td style=\"border-left: none; border-right: none;\">0.0154</td><td style=\"border-left: none; border-right: none;\"><strong>0.9026</strong></td><td style=\"border-left: none; border-right: none;\">0.0370</td></tr>\n\n<tr class='loading-row separator-strong-after'><td style=\"border-left: none; border-right: none;\">Hg</td><td style=\"border-left: none; border-right: none;\">0.4746</td><td style=\"border-left: none; border-right: none;\">0.0701</td><td style=\"border-left: none; border-right: none;\">0.0210</td><td style=\"border-left: none; border-right: none;\">0.1026</td><td style=\"border-left: none; border-right: none;\"><strong>0.7648</strong></td></tr>\n\n<tr style=\"border-top: 3px solid #000;\">\n\n<tr>\n  <td style=\"border-left: none; border-right: none;\">Explained Var</td>\n  <td style=\"border-left: none; border-right: none;\">6.8004</td>\n  <td style=\"border-left: none; border-right: none;\">1.9562</td>\n  <td style=\"border-left: none; border-right: none;\">1.5927</td>\n  <td style=\"border-left: none; border-right: none;\">1.1830</td>\n  <td style=\"border-left: none; border-right: none;\">1.3230</td>\n</tr>\n<tr><td style=\"border-left: none; border-right: none;\">Proportion of Var</td><td style=\"border-left: none; border-right: none;\">0.4250</td><td style=\"border-left: none; border-right: none;\">0.1223</td><td style=\"border-left: none; border-right: none;\">0.0995</td><td style=\"border-left: none; border-right: none;\">0.0739</td><td style=\"border-left: none; border-right: none;\">0.0827</td></tr>\n<tr><td style=\"border-left: none; border-right: none;\">Cumulative Var</td><td style=\"border-left: none; border-right: none;\">0.4250</td><td style=\"border-left: none; border-right: none;\">0.5473</td><td style=\"border-left: none; border-right: none;\">0.6468</td><td style=\"border-left: none; border-right: none;\">0.7208</td><td style=\"border-left: none; border-right: none;\">0.8035</td></tr>\n</tbody>\n</table>\n</div>\n</div>\n\n</div>"}, {"cell_type": "markdown", "source": "<!-- explanation -->\nThe Loadings define how the stressors are linearly constructed from the original chemical variables.\nDrop off the $PC_2$ that mainly carries natural metals, the remaining $PCs (16 \\times 4)$ left multiplies the chemical matrix $(311 \\times 16)$ to bring the most original variation into a $\\mathbb{R}^{311 \\times 4}$ of four orthogonal stressors, which helps partition the contamination variation in a quantitative cleaner way.\n\n$$\n\\mathbf{M}_{(311 \\times 16)} \\mathbf{PCs}_{(16 \\times 4)} = \\mathbf{S}_{(311 \\times 4)} = [S_1, S_2, S_3, S_4]_{(311 \\times 4)}\n\\tag{1}\n$$"}, {"cell_type": "markdown", "source": "On top of the four stressors values, two views are adopted to process the four stressor values into per-site contamination scores.\n\n1. **Additive contamination effect**. It assumes stressor effects on community are additive, then four stressor values of each site are summed up in raw scale.\nIt produces Sum Relative Contamination Score (**SumRel**).\n\n$$\n\\text{SumRel} = \\mathbf{S}_{(311 \\times 4)} \\mathbf{1}_{(4 \\times 1)} = \\mathbf{C}_{(311 \\times 1)} = [c_1, c_2, ..., c_{311}]^T_{(311 \\times 1)}\n\n\\tag{2}\n$$\n\n2. **Maximum contamination effect**. It assumes stressor effects on community are dominated by the maximum one, then only the maximum stressor value of each site is taken as the contamination score.\nIt produces Max Relative Contamination Score (MaxRel).\n\n$$\n\\text{MaxRel} = \\max_{\\text{column wise}}(\\mathbf{S}_{(311 \\times 4)}) = \\mathbf{C}_{(311 \\times 1)} = [c_1, c_2, ..., c_{311}]^T_{(311 \\times 1)}\n\n\\tag{3}\n$$"}, {"cell_type": "markdown", "source": "<div style=\"width: 80%; max-width: 700px; margin: 0 auto;\">\n\n![SumRel corridor bifurcation](images/gallery/ch2_fm1_SumRel_corridor_bifurcation.png)\n\n*Figure 1: 310 sites Sum Relative Contamination Score (SumRel): **Left**: corridor map of the lowest 20% or 62 sites (green scatters), highest 62 sites (red scatters) and middle sites (blue scatters). **Right**: ECDF bifurcation of the lowest- and most-polluted 62 sites across the Huron\u2013St. Clair\u2013Detroit corridor.*\n\n</div>"}, {"cell_type": "markdown", "source": "<div style=\"width: 80%; max-width: 700px; margin: 0 auto;\">\n\n![MaxRel corridor bifurcation](images/gallery/ch2_fm1_MaxRel_corridor_bifurcation.png)\n\n*Figure 2: 310 sites Max Relative Contamination Score (MaxRel): **Left**: corridor map of the lowest 20% or 62 sites (green scatters), highest 62 sites (red scatters) and middle sites (blue scatters). **Right**: ECDF bifurcation of the lowest- and most-polluted 62 sites across the Huron\u2013St. Clair\u2013Detroit corridor.*\n\n</div>"}, {"cell_type": "markdown", "source": "Each view has its own rationale to be applied, it needs background in toxicology and understanding of closest effects on taxa composition to distill which one is better for the purpose of selecting reference sites with minimal contamination effects on taxa composition.\n\nThe author (Feng) proceeded with the results from additive contamination effect view (Figure <span style=\"color: blue;\">1</span>) as contamination measures for downstream analysis. When talking about contamination scores later, it refers to the elements in the SumRel vector from Equation <span style=\"color: blue;\">(2)</span>."}, {"cell_type": "markdown", "source": "### Framework 2 \u2014 Select and validate sites with least contamination effects on their taxa composition \n\nWith the SumRel contamination scores $\\mathbf{C}_{(311 \\times 1)}$, it supports to rank and select the sites with lowest contamination scores as the least-polluted sites where the taxa compositions are assumed to be least affected by compound contamination.\n\nIn previous work (Zhang, 2008) it was made without validatoin that the 20% sites (62) with lowest contamination scores were selected as least-polluted sites, where the taxa composition was assumed in reference condition with least contamination effects.\n\nIn this framework, still the 20% (62) lowest-scored sites are selected as the community reference subset but their defensibility are validated by repeatedly resampling random site subsets of equal size. For each subset, RDA (a multivariate regression method) regresses taxa matrix on retained stressor matrix and records $\\bar R^2$ as indicator of the stressor constrained variation in taxa matrix. \n\nThe chosen 62 sites should have a significantly low $\\bar R^2$ in a random distribution of $\\bar R^2$ from the resampled subsets, which interprets few stressor constrained variation in their taxa matrix and interprets them as least affected by the chemical stressors."}, {"cell_type": "markdown", "source": "<div style=\"width: 80%; max-width: 700px; margin: 0 auto;\">\n\n![Empirical distribution \u2014 adjusted R\u00b2](images/gallery/ch2_fw2_empirical_distribution_adj_R2.png)\n\n*Figure: Empirical distribution of adjusted $R^2$ under repeated resampling, providing a null reference for the observed signal.*\n\n</div>"}, {"cell_type": "markdown", "source": "<div style=\"width: 80%; max-width: 700px; margin: 0 auto;\">\n\n![Empirical distribution \u2014 p-value](images/gallery/ch2_fw2_empirical_distribution_p_value.png)\n\n*Figure: Empirical distribution of permutation p-values for the resampled RDA models.*\n\n</div>"}, {"cell_type": "markdown", "source": "<div style=\"width: 80%; max-width: 700px; margin: 0 auto;\">\n\n![Adjusted R\u00b2 by number of sites](images/gallery/ch2_fw2_extension_adj_R2_by_m.png)\n\n*Figure: Adjusted $R^2$ of Environmental / Stressor / SumRel predictors as a function of the number of sites passed to RDA fitting; the shaded band marks the reference-site cut-off range (46\u201377).*\n\n</div>"}, {"cell_type": "markdown", "source": "## Chapter 3 \u2014 Environmental Standardization"}, {"cell_type": "markdown", "source": "### Framework 1 \u2014 Clustering of Reference Sites\n\nHierarchical clustering on the 44 least-polluted sites, with approximately\nunbiased (AU) bootstrap support and node-wise ANOVA on environmental\ndescriptors."}, {"cell_type": "markdown", "source": "<div style=\"width: 60%; max-width: 700px; margin: 0 auto;\">\n\n![Ward dendrogram with AU support](images/gallery/ch3_fw1_cluster_dendrogram_AUs.png)\n\n*Figure: Ward dendrogram for the 44 least-polluted sites at $k=3$; \nAU bootstrap support is annotated for each cluster \n($C_1 = 0.62$, $C_2 = 0.71$, $C_3 = 0.91$).*\n\n</div>"}, {"cell_type": "markdown", "source": "<div style=\"width: 60%; max-width: 700px; margin: 0 auto;\">\n\n![Finalized cluster barplot](images/gallery/ch3_fw1_finalized_cluster_barplot.png)\n\n*Figure: Per-variable cluster means for the finalized three-cluster solution, highlighting the environmental contrast between  $C_1$ and $C_2$.*\n\n</div>"}, {"cell_type": "markdown", "source": "<div class='gallery-table-block'>\n<div class='table-wrapper'>\n<table class='gallery-result-table'>\n<thead>\n<tr><th>Cluster</th><th>n</th><th>AU</th><th>BP</th><th>Match</th><th>Jaccard</th><th>Members</th></tr>\n</thead>\n<tbody>\n<tr><td>C1</td><td>46</td><td>0.927</td><td>0.055</td><td>exact</td><td>1</td><td>DR-03, DR-144, DR-145, DR-156, DR-159, DR-37 ...</td>
