  <script>
    window.PAGE_ID = "gallery";
    window.cells = [{"cell_type": "markdown", "source": "# Gallery\n\nA chronological showcase of every figure and tabular result generated by the\nchapter workflows. Items are grouped by **chapter** and **framework**, in the\nsame order they appear in the analysis. Tables exported as `.xlsx` are read\ndirectly from the results folder and displayed inline below their caption."}, {"cell_type": "markdown", "source": "## Chapter 2 \u2014 Pollution Assessment\n\n\n\nA chronological showcase of every figure and tabular result generated by the\nchapter workflows. Items are grouped by **chapter** and **framework**, in the\nsame order they appear in the analysis. Tables exported as `.xlsx` are read\ndirectly from the results folder and displayed inline below their caption."}, {"cell_type": "markdown", "source": "### Framework 1 \u2014 Composite Contamination Score (SumRel / MaxRel)\n\nPCA-based rotation of contaminant loadings is used to construct composite\ncontamination scores. Empirical cumulative distributions identify\nreference vs. degraded site corridors."}, {"cell_type": "markdown", "source": "![SumRel corridor bifurcation](images/gallery/ch2_fm1_SumRel_corridor_bifurcation.png)\n\n*Figure: SumRel contamination score: ECDF bifurcation of the lowest- and most-polluted 62 sites across the Huron\u2013St. Clair\u2013Detroit corridor.*"}, {"cell_type": "markdown", "source": "![MaxRel corridor bifurcation](images/gallery/ch2_fm1_MaxRel_corridor_bifurcation.png)\n\n*Figure: MaxRel contamination score: ECDF bifurcation of the extreme tails, isolating reference (green) and most-polluted (red) sites.*"}, {"cell_type": "markdown", "source": "<div class=\"gallery-table-block\">\n<div class=\"table-wrapper\">\n<table class=\"gallery-result-table\">\n<thead><tr><th>Chemical / Summary</th><th>PC1</th><th>PC2</th><th>PC3</th><th>PC4</th><th>PC5</th></tr></thead>\n<tbody><tr><td>Co</td><td>0.721</td><td>0.428</td><td>-0.012</td><td>-0.036</td><td>0.402</td></tr><tr><td>Al</td><td>0. ies the optimal cut-off for reference-site selection."}, {"cell_type": "markdown", "source": "![Adjusted R\u00b2 by number of sites](images/gallery/ch2_fw2_extension_adj_R2_by_m.png)\n\n*Figure: Adjusted $R^2$ of Environmental / Stressor / SumRel predictors as a function of the number of sites passed to RDA fitting; the shaded band marks the reference-site cut-off range (46\u201377).*"}, {"cell_type": "markdown", "source": "![Empirical distribution \u2014 adjusted R\u00b2](images/gallery/ch2_fw2_empirical_distribution_adj_R2.png)\n\n*Figure: Empirical distribution of adjusted $R^2$ under repeated resampling, providing a null reference for the observed signal.*"}, {"cell_type": "markdown", "source": "![Empirical distribution \u2014 p-value](images/gallery/ch2_fw2_empirical_distribution_p_value.png)\n\n*Figure: Empirical distribution of permutation p-values for the resampled RDA models.*"}, {"cell_type": "markdown", "source": "## Chapter 3 \u2014 Environmental Standardization"}, {"cell_type": "markdown", "source": "### Framework 1 \u2014 Clustering of Reference Sites\n\nHierarchical clustering on the 44 least-polluted sites, with approximately\nunbiased (AU) bootstrap support and node-wise ANOVA on environmental\ndescriptors."}, {"cell_type": "markdown", "source": "![Ward dendrogram with AU support](images/gallery/ch3_fw1_cluster_dendrogram_AUs.png)\n\n*Figure: Ward dendrogram for the 44 least-polluted sites at $k=3$; AU bootstrap support is annotated for each cluster ($C_1 = 0.62$, $C_2 = 0.71$, $C_3 = 0.91$).*"}, {"cell_type": "markdown", "source": "![Finalized cluster barplot](images/gallery/ch3_fw1_finalized_cluster_barplot.png)\n\n*Figure: Per-variable cluster means for the finalized three-cluster solution, highlighting the environmental contrast across $C_1$\u2013$C_3$.*"}, {"cell_type": "markdown", "source": "<div class=\"gallery-table-block\">\n<div class=\"table-wrapper\">\n<table class=\"gallery-result-table\">\n<thead><tr><th>Cluster</th><th>n</th><th>AU</t 4_framework2_stress_scree.png)\n\n*Figure: Stress vs. number of NMDS axes; the elbow informs the choice of dimensionality.*"}, {"cell_type": "markdown", "source": "![Shepard diagrams](images/gallery/ch4_framework2_shepard_diagrams.png)\n\n*Figure: Shepard diagrams comparing observed Bray\u2013Curtis distances to NMDS ordination distances; near-monotonic alignment confirms a good fit.*"}, {"cell_type": "markdown", "source": "![Ordination panels](images/gallery/ch4_framework2_ordination_panels.png)\n\n*Figure: Final NMDS ordination panels colored by cluster membership, with pole markers used in the ZCI construction.*"}];
