  <script>
    window.PAGE_ID = "gallery";
    window.cells = [{"cell_type": "markdown", "source": "# Gallery\n\nA chronological showcase of every figure and tabular result generated by the\nchapter workflows. Items are grouped by **chapter** and **framework**, in the\nsame order they appear in the analysis. Tables exported as `.xlsx` are linked\nfor download below their caption."}, {"cell_type": "markdown", "source": "# Chapter 2 \u2014 Pollution Assessment"}, {"cell_type": "markdown", "source": "## Framework 1 \u2014 Composite Contamination Score (SumRel / MaxRel)\n\nPCA-based rotation of contaminant loadings is used to construct composite\ncontamination scores. Empirical cumulative distributions identify\nreference vs. degraded site corridors."}, {"cell_type": "markdown", "source": "![SumRel corridor bifurcation](images/gallery/ch2_fm1_SumRel_corridor_bifurcation.png)\n\n**Figure 2.1.1** \u2014 *SumRel contamination score: ECDF bifurcation of the\nlowest- and most-polluted 62 sites across the Huron\u2013St. Clair\u2013Detroit\ncorridor.*"}, {"cell_type": "markdown", "source": "![MaxRel corridor bifurcation](images/gallery/ch2_fm1_MaxRel_corridor_bifurcation.png)\n\n**Figure 2.1.2** \u2014 *MaxRel contamination score: ECDF bifurcation of the\nextreme tails, isolating reference (green) and most-polluted (red) sites.*"}, {"cell_type": "markdown", "source": "<a class=\"table-download\" href=\"results/ch2_fw1_rotated_loading_table.xlsx\" download>Download \u2014 Table 2.1.1: Rotated PCA Loadings</a>\n\n**Table 2.1.1** \u2014 *Varimax-rotated contaminant loadings used to derive the\nSumRel and MaxRel scores.*"}, {"cell_type": "markdown", "source": "## Framework 2 \u2014 Resampling RDA & Empirical Validation\n\nRepeated RDA with subsampling probes the stability of taxa\u2013environment\nassociations and identifies the optimal cut-off for reference-site selection."}, {"cell_type": "markdown", "source": "![Adjusted R\u00b2 by number of sites](images/gallery/ch2_fw2_extension_adj_R2_by_m.png)\n\n**Figure 2.2.1** \u2014 *Adjusted $R^2$ of Environmental / Stressor / SumRel\npredictors as a function of the number of sites passed to RDA fitting; the\nshaded band marks the reference-site cut-off range (46\u201377).*"}, {"cell_type": "markdown", "source": "![Empirical distribution \u2014 adjusted R\u00b2](images/gallery/ch2_fw2_empirical_distribution_adj_R2.png)\n\n**Figure 2.2.2** \u2014 *Empirical distribution of adjusted $R^2$ under repeated\nresampling, providing a null reference for the observed signal.*"}, {"cell_type": "markdown", "source": "![Empirical distribution \u2014 p-value](images/gallery/ch2_fw2_empirical_distribution_p_value.png)\n\n**Figure 2.2.3** \u2014 *Empirical distribution of permutation p-values for the\nresampled RDA models.*"}, {"cell_type": "markdown", "source": "<a class=\"table-download\" href=\"results/ch2_fw2_resampling_rda_results.xlsx\" download>Download \u2014 Table 2.2.1: Resampling RDA Results</a>\n\n**Table 2.2.1** \u2014 *Per-replicate RDA summary statistics (adj. $R^2$, p-values,\nexplained variance) for all resampling iterations.*"}, {"cell_type": "markdown", "source": "# Chapter 3 \u2014 Environmental Standardization"}, {"cell_type": "markdown", "source": "## Framework 1 \u2014 Clustering of Reference Sites\n\nHierarchical clustering on the 44 least-polluted sites, with approximately\nunbiased (AU) bootstrap support and node-wise ANOVA on environmental\ndescriptors."}, {"cell_type": "markdown", "source": "![Ward dendrogram with AU support](images/gallery/ch3_fw1_cluster_dendrogram_AUs.png)\n\n**Figure 3.1.1** \u2014 *Ward dendrogram for the 44 least-polluted sites at $k=3$;\nAU bootstrap support is annotated for each cluster ($C_1 = 0.62$,\n$C_2 = 0.71$, $C_3 = 0.91$).*"}, {"cell_type": "markdown", "source": "![Finalized cluster barplot](images/gallery/ch3_fw1_finalized_cluster_barplot.png)\n\n**Figure 3.1.2** \u2014 *Per-variable cluster means for the finalized three-cluster\nsolution, highlighting the environmental contrast across $C_1$\u2013$C_3$.*"}, {"cell_type": "markdown", "source": "<a class=\"table-download\" href=\"results/ch3_fw1_pvclust_cluster_results.xlsx\" download>Download \u2014 Table 3.1.1: pvclust Cluster Results</a>\n\n**Table 3.1.1** \u2014 *Bootstrap cluster assignments and AU / BP support values\nfrom the `pvclust` analysis.*"}, {"cell_type": "markdown", "source": "<a class=\"table-download\" href=\"results/ch3_fw1_finalized_cluster_anova_table.xlsx\" download>Download \u2014 Table 3.1.2: Finalized Cluster ANOVA</a>\n\n**Table 3.1.2** \u2014 *One-way ANOVA on environmental variables across the\nfinalized three clusters.*"}, {"cell_type": "markdown", "source": "<a class=\"table-download\" href=\"results/ch3_fw1_nodewise_anova_report.xlsx\" download>Download \u2014 Table 3.1.3: Node-wise ANOVA Report</a>\n\n**Table 3.1.3** \u2014 *Node-by-node ANOVA along the dendrogram, identifying which\nsplits separate environmentally distinct groups.*"}, {"cell_type": "markdown", "source": "## Framework 2 \u2014 Env\u2013Taxa Concordance\n\nJoint assessment of cluster membership in environmental and taxonomic space\nto extract concordant reference sites."}, {"cell_type": "markdown", "source": "![Concordance margin scatter](images/gallery/ch3_fw2_concordance_margin_scatter.png)\n\n**Figure 3.2.1** \u2014 *Consensus margins for the 60 least-polluted sites:\nenvironmental margin (own cluster vs. best alternative) plotted against the\ntaxa margin; the upper-right quadrant marks concordant sites.*"}, {"cell_type": "markdown", "source": "## Framework 3 \u2014 PCA Region Heatmaps & LDA Benchmark\n\nProbabilistic PCA region maps and discriminant analyses comparing the\nconcordant subset against the full benchmark sample."}, {"cell_type": "markdown", "source": "![Concordant PCA region heatmap](images/gallery/ch3_fw3_concordant_pca_region_heatmap.png)\n\n**Figure 3.3.1** \u2014 *Finalized EnvStrong region map (PC1\u2013PC2 and PC1\u2013PC3) for\nthe concordant reference sites; arrows show variable loadings.*"}, {"cell_type": "markdown", "source": "![All-site PCA region heatmap](images/gallery/ch3_fw3_all_site_pca_region_heatmap.png)\n\n**Figure 3.3.2** \u2014 *Region map projected over all sites for comparison with\nthe concordant-only model.*"}, {"cell_type": "markdown", "source": "<a class=\"table-download\" href=\"results/ch3_fw3_concordant_lda_stratified_confusion_matrix.xlsx\" download>Download \u2014 Table 3.3.1: Concordant LDA (Stratified) Confusion Matrix</a>\n\n**Table 3.3.1** \u2014 *Stratified cross-validation confusion matrix for the LDA\ntrained on the concordant reference set.*"}, {"cell_type": "markdown", "source": "<a class=\"table-download\" href=\"results/ch3_fw3_concordant_lda_random_split_cv_confusion_matrix.xlsx\" download>Download \u2014 Table 3.3.2: Concordant LDA (Random Split CV)</a>\n\n**Table 3.3.2** \u2014 *Random-split cross-validation confusion matrix for the\nconcordant LDA model.*"}, {"cell_type": "markdown", "source": "<a class=\"table-download\" href=\"results/ch3_fw3_benchmark_lda_stratified_confusion_matrix.xlsx\" download>Download \u2014 Table 3.3.3: Benchmark LDA (Stratified)</a>\n\n**Table 3.3.3** \u2014 *Benchmark LDA confusion matrix (stratified CV) on the\nfull sample, used as a comparison baseline.*"}, {"cell_type": "markdown", "source": "<a class=\"table-download\" href=\"results/ch3_fw3_benchmark_lda_random_split_cv_confusion_matrix.xlsx\" download>Download \u2014 Table 3.3.4: Benchmark LDA (Random Split CV)</a>\n\n**Table 3.3.4** \u2014 *Benchmark LDA confusion matrix (random-split CV).*"}, {"cell_type": "markdown", "source": "# Chapter 4 \u2014 ZCI of Bray\u2013Curtis Ordination on Community Composition"}, {"cell_type": "markdown", "source": "## Framework 2 \u2014 NMDS Ordination & Pole Geometry\n\nNon-metric multidimensional scaling on Bray\u2013Curtis dissimilarities, with\nstress diagnostics, Shepard fit, and pole-based ZCI construction."}, {"cell_type": "markdown", "source": "![Stress scree plot](images/gallery/ch4_framework2_stress_scree.png)\n\n**Figure 4.2.1** \u2014 *Stress vs. number of NMDS axes; the elbow informs the\nchoice of dimensionality.*"}, {"cell_type": "markdown", "source": "![Shepard diagrams](images/gallery/ch4_framework2_shepard_diagrams.png)\n\n**Figure 4.2.2** \u2014 *Shepard diagrams comparing observed Bray\u2013Curtis distances\nto NMDS ordination distances; near-monotonic alignment confirms a good fit.*"}, {"cell_type": "markdown", "source": "![Ordination panels](images/gallery/ch4_framework2_ordination_panels.png)\n\n**Figure 4.2.3** \u2014 *Final NMDS ordination panels colored by cluster\nmembership, with pole markers used in the ZCI construction.*"}, {"cell_type": "markdown", "source": "<a class=\"table-download\" href=\"results/ch4_framework2_stress_profile.xlsx\" download>Download \u2014 Table 4.2.1: Stress Profile</a>\n\n**Table 4.2.1** \u2014 *NMDS stress values across candidate dimensions.*"}, {"cell_type": "markdown", "source": "<a class=\"table-download\" href=\"results/ch4_framework2_nmds_fit_summary.xlsx\" download>Download \u2014 Table 4.2.2: NMDS Fit Summary</a>\n\n**Table 4.2.2** \u2014 *Summary of the finalized NMDS solution (stress, linear and\nnon-metric $R^2$).*"}, {"cell_type": "markdown", "source": "<a class=\"table-download\" href=\"results/ch4_framework2_pole_geometry.xlsx\" download>Download \u2014 Table 4.2.3: Pole Geometry</a>\n\n**Table 4.2.3** \u2014 *Coordinates and pairwise distances for the cluster poles\nused to compute the Zoobenthic Community Index.*"}, {"cell_type": "markdown", "source": "<a class=\"table-download\" href=\"results/ch4_framework2_residual_summary.xlsx\" download>Download \u2014 Table 4.2.4: Residual Summary</a>\n\n**Table 4.2.4** \u2014 *Residual diagnostics for the NMDS fit.*"}];
  </script>
