  <script>
    window.PAGE_ID = "architecture";
    window.cells = [{"cell_type": "markdown", "source": "# From Chapter Goals to Computation Pipelines: A Three-Level Thesis Architecture\n\nThe narrative way of this study follows a three-level architecture, which are connected and progressive levels.\nA discussion around the chapter $i$ with $k_i$ frameworks is in layout as below:\n\n- **Chapter $i$ Layer**\n\n    '*Do what we do with a chapter.*'\n\n  - **Framework $j$ Layer** $(j = 1, \\dots, k_i)$\n  \n    '*Do what we do with a framework.*'\n\n    - **Computation Process $j$ Layer** $(j = 1, \\dots, k_i)$\n    \n      '*Do what we do with a computation process.*'\n\nTheir basic roles and relationships are as below:\n\n**Chapter**:\n  What larger research objective is being addressed?\n\n**Framework**:\n  What analytical logic is used to address part of that objective?\n\n**Computation Process**:\n  What exact inputs, tools, models, and outputs implement that framework?\n\n \nThis three-level architecture will exist throughout all discussions in the thesis,\nspecific structures and designs within them are described in the following:\n\n$$\n\\text{Chapter } i \\xrightarrow{contains} \\text{Framework } j \\xrightarrow{guides} \\text{Computation Process } j \n\\quad (j = 1, \\dots, k_i)\n$$"}, {"cell_type": "markdown", "source": "## Chapter $i$ Overview\n\nA chapter starts with a summary that includes the following 5 components:\n\n**Objectives**\n - What this chapter aims to achieve.\n\n**Reasons**\n - Why this chapter is necessary in the thesis.\n\n**How**\n - The high-level reasoning that implements the chapter's objectives.\n\n**Expected Contribution**\n - What this chapter should tell us after completion.\n\n**List of its Frameworks**\n - A list of frameworks included in this chapter and the sub-target of each framework."}, {"cell_type": "markdown", "source": "## Framework $j$ Overview\n\n**Questions/Motivations**\n - What problem this framework addresses, why it matters, and what concerns must be handled.\n\n**Methods and Steps**\n - The major techniques used, their order, and how they interact.\n\n**Expected Conclusions**\n - What kind of result this framework should produce and how it supports the chapter objective."}, {"cell_type": "markdown", "source": "## Computation Process $j$ Overview\n\nThe **input-process-output** process describes every computation flow in this study,\nit consists of three objects: (inputs, process, outputs), they form a computation path of:\n\n$$\n\\text{Inputs} \\rightarrow \\text{Process} \\rightarrow \\text{Outputs}\n$$\n\nWithin the type of each object, there are elements that take different and professional roles for clarity,\nevery object involved in a computation process can be categorized to an exact element type as defined in the table below:\n\n<table style=\"margin-left: auto; margin-right: auto;\">\n<caption style=\"caption-side: top; text-align: center; margin-bottom: 8px;\">\n    <strong>Table</strong>: Elements in each object of the input-process-output computation process.\n  </caption>\n  <thead>\n    <tr>\n      <th style=\"text-align: center; vertical-align: middle;\">Object</th>\n      <th style=\"text-align: center; vertical-align: middle;\">Elements</th>\n      <th style=\"text-align: center; vertical-align: middle;\">Description</th>\n    </tr>\n  </thead>\n  <tbody>\n    <tr>\n      <td rowspan=\"2\" style=\"text-align: center; vertical-align: middle;\">Inputs</td>\n      <td style=\"text-align: center; vertical-align: middle;\">metadata</td>\n      <td>retrieved data from the complete metadata in data preparation</td>\n    </tr>\n    <tr>\n      <td style=\"text-align: center; vertical-align: middle;\">artifacts</td>\n      <td>artifacts produced from earlier computation processes</td>\n    </tr>\n    <tr>\n      <td rowspan=\"4\" style=\"text-align: center; vertical-align: middle;\">Process</td>\n      <td style=\"text-align: center; vertical-align: middle;\">transformations</td>\n      <td rowspan=\"4\" style=\"vertical-align: middle;\">applied to inputs to generate numerical and visual outputs</td>\n    </tr>\n    <tr>\n      <td style=\"text-align: center; vertical-align: middle;\">bridging tools</td>\n    </tr>\n    <tr>\n      <td style=\"text-align: center; vertical-align: middle;\">models</td>\n    </tr>\n    <tr>\n      <td style=\"text-align: center; vertical-align: middle;\">interpreters</td>\n    </tr>\n    <tr>\n      <td rowspan=\"2\" style=\"text-align: center; vertical-align: middle;\">Outputs</td>\n      <td style=\"text-align: center; vertical-align: middle;\">results</td>\n      <td>numerical tables or visual figures retained for discussion in the chapter</td>\n    </tr>\n    <tr>\n      <td style=\"text-align: center; vertical-align: middle;\">artifacts</td>\n      <td>results that must be passed forward as inputs to the next framework</td>\n    </tr>\n  </tbody>\n</table>"}, {"cell_type": "markdown", "source": "For additional clarity, each **instance** of an element produced within a given framework $j$ is described explicitly.\nThe instances of **metadata**, **artifacts** and **results** are usually tables and figures. Because these objects follow standard patterns, they are described in the following way.\n\n**Pattern for defining table and figure instances of metadata, artifacts and results**:\n\n- table: name of the table\n\n  - rows: $(\\text{column name}_1, \\text{column name}_2, \\ldots, \\text{column name}_p)$\n\n  - shape: $(\\text{number of rows} \\times \\text{number of columns})$\n\n- figure: name of the figure\n\n  - x-axis: label of the x-axis and the values of its ticks\n\n  - y-axis: label of the y-axis and the values of its ticks\n\n  - legend: 'if applicable, description of the legend'\n\n  - annotations: 'if applicable, description of the annotations'\n\n- If a table or a figure has a prime, like table' or figure', then it is displayed in the **appendix**.\n- If a table or a figure has an asterisk, like table* or figure*, then it includes some **extra** but less important properties that are not described in the design and are attached to the table or figure.\n\n\nThe instances that belong to the remaining elements, **transformations**, **bridging tools**, **models**, and **interpreters**, are more abstract and usually involve internal computations or operations on the inputs to generate the outputs. Their design and explanation allow more flexibility, but for clarity and consistency they follow the pattern below:\n\n**Pattern for defining instances of transformations, bridging tools, models and interpreters**:\n\n- instance: name of the instance\n  - description of its usage, what it takes, and what it produces\n\n\n### Example: A framework 'x' to compute the Standard Error of the average temperature in the $\\mathbf{E}$ data\n\nTo make the computation process concrete, consider the task of estimating the 0.95 confidence interval of the mean of the temperature variable in the $\\mathbf{E}$ data.\nInitialize a framework 'x'. It is designed to calculate the confidence interval of the mean of a certain variable in a dataset, and its process can be described as follows:\n\n**Inputs**:\n\nMetadata:  \n- the environmental data - matrix $\\mathbf{E}$\n\nArtifacts: none\n\n**Process**:\n\nTransformation: none\n\nBridging Tools: \n- *column selector*\n  - it picks out certain columns from a matrix, tabular data, or a dataframe.\n\n- confidence interval selector\n  - given a certain distribution, it constructs the wanted confidence interval\n  in an informative way - the least random value interval with the wanted probability mass\n\nModels:\n- *averaging operator*\n  - it calculates the mean of the selected columns.\n\n- *standard error calculator*\n  - it calculates the standard error of the mean for the selected columns.\n\n- *t-distribution calculator*\n  - it instantiates the t-distribution with the estimated mean and its standard error\n\nInterpreters:\n- *confidence interval expressor*\n  - it expresses the selected confidence interval in a readable way, e.g., $[\\text{lower bound}, \\text{upper bound}]$\n\n**Outputs**:\n\nResults:\n- table: 0.95 confidence interval of the mean of the temperature variable\n\n  - rows: (confidence level, lower bound, upper bound)\n\n  - shape: $(1 \\times 3)$\n\n- figure: confidence interval on the t-distribution curve\n\n  - x-axis: mean of the temperature variable; ticks span the range of the variable's possible means\n\n  - y-axis: probability density; ticks are determined by the t-distribution curve\n\n  - highlight: the most informative 0.95 confidence interval on the curve\n\n  - legend: 'the 0.95 confidence interval highlighted'\n\nArtifacts:\n- table: 0.95 confidence interval of the mean of the temperature variable\n\n  - rows: (confidence level, lower bound, upper bound)\n\n  - shape: $(1 \\times 3)$\n\n**Demonstration Outputs**:\n\n\n<div style=\"width: 80%; max-width: 700px; margin: 0 auto;\">\n  <img src=\"images/example_standard_error_of_t_dis.png\" alt=\"Standard Error of the Mean Calculation\" style=\"width: 100%; display: block;\">\n  <p style=\"margin-top: 8px;\"><em>Figure: The estimated 0.95 confidence interval of the mean of the temperature variable.\n  All instances of elements are annotated with arrows pointing to the corresponding components of the figure.</em></p>\n</div>"}, {"cell_type": "markdown", "source": "\n### Example: the independence of frameworks across chapters\n\nIn this study, five chapters (chapter 2 to chapter 6) involve computation, and each one builds on earlier results. The connection among chapters is reflected more specifically in the connection among their frameworks.\n\nThis relationship among frameworks across chapters can be described by the following recursive updating pattern:\n\n```text\n# initial inputs for chapter 2 have been prepared\nFor each chapter i in [2, 3, 4, 5, 6]:\n\n    # execute the process for chapter i\n    inputs -> process.i -> outputs\n\n    # discuss the outputs in chapter i\n    outputs -> discussion in chapter i\n\n    # prepare the inputs for chapter i + 1\n    inputs <- (fetch.chapter(i+1).metadata, outputs.artifacts)\n```"}];
  </script>
