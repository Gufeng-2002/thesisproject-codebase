  <script>
    window.PAGE_ID = "chapter4";
    window.cells = [{"cell_type": "markdown", "source": "# Chapter 4: Zoobenthic Community Indicator from Bray-Curtis Ordination Within Reference Community Types\n\n**Objectives**\n\nWithin each of the $k$ reference community types identified in Chapter 3, summarize the raw $\\mathbb{R}^{16}$ multivariate taxa records into a single, interpretable site-level **zoobenthic community indicator (ZCI)** that quantifies where each site sits along a reference-to-degraded compositional gradient. The construction proceeds in three connected steps: an ecologically meaningful dissimilarity measure (Bray-Curtis) on the raw taxa records, a non-parametric ordination (NMDS) that returns the sites to a Euclidean configuration, and a projection-based scoring step that converts ordination coordinates into the ZCI.\n\n**Reasons**\n\nTwo competing requirements pull the analysis in opposite directions. On one hand, **ecological realism** demands a dissimilarity measure that handles the double-zero problem, weights shared abundance and abundance differences appropriately, and stays bounded \u2014 properties that Euclidean distance on the raw $\\mathbb{R}^{16}$ taxa records fails to satisfy. Applying Euclidean distance directly to the 16-dimensional taxa space produces numerical values without ecological meaning.\n\nOn the other hand, **geometric tractability** demands that the configuration in which sites live supports linear operations \u2014 projection onto a reference-to-degraded axis, distance ratios, and other constructions that downstream indicator modeling depends on. Ecologically appropriate dissimilarity measures such as Bray-Curtis are typically **non-metric**: they violate the triangle inequality, so the pairwise dissimilarity matrix cannot be embedded into any Euclidean space without distortion. Direct ordination by linear methods (e.g., PCoA) on a non-metric matrix produces negative eigenvalues and geometrically meaningless axes, breaking the connection between the ordination output and the ecological dissimilarity it was supposed to encode.\n\nA further requirement is **interpretability of direction**. The multivariate composition of a site has no inherent \"good\" or \"bad\" orientation; without external anchoring, any ordination axis is free to point in either direction and its sign carries no ecological meaning. To convert the ordination into an indicator that ranks sites from reference-like to degraded-like, the chapter introduces two hypothetical composition endpoints \u2014 a **reference pole** $E_{\\mathrm{ref}}$ and a **degraded pole** $E_{\\mathrm{deg}}$ \u2014 that impose external knowledge about the direction of ecological degradation onto the ordination space.\n\nThe chapter resolves the geometric conflict by **decoupling** the requirements. Ecological realism is handled at the dissimilarity step (Bray-Curtis on the raw taxa records). Euclidean geometry is recovered at the ordination step through a non-parametric method (NMDS) that preserves the *rank order* of the original dissimilarities rather than their numerical values. Rank preservation absorbs the non-metric character of Bray-Curtis without forcing the ordination to inherit it, so the resulting $\\mathbb{R}^{q}$ configuration is genuinely Euclidean. Directional interpretability is then handled at the scoring step through projection onto the axis defined by the two poles in the ordination space.\n\n**How**\n\nThe procedure is applied $k$ times \u2014 once within each reference community type identified in Chapter 3 \u2014 so that environmental confounding is held constant within each application and the ZCI reflects only within-type compositional variation along the reference-to-degraded gradient.\n\nIn each community type, two hypothetical composition vectors are constructed: a reference pole $E_{\\mathrm{ref}}$ and a degraded pole $E_{\\mathrm{deg}}$. These poles augment the within-type taxa matrix from $m$ sites to $m+2$. Bray-Curtis dissimilarity is then computed pairwise across all $(m+2)$ rows, producing the augmented dissimilarity matrix:\n\n$$\n\\mathbf{T}_{(m \\times p)} \\xrightarrow{\\text{add poles}} \\mathbf{T}_{((m+2) \\times p)} \\xrightarrow{\\text{Bray-Curtis}} \\mathbf{D}^{BC}_{(m+2) \\times (m+2)}\n$$\n\nThe $\\binom{m+2}{2}$ pairwise dissimilarities $d_{ij}$ from the upper triangle of $\\mathbf{D}^{BC}$ are ranked. NMDS then searches for an ordination configuration $\\mathbf{Y}_{(m+2) \\times q}$ such that the Euclidean distances $\\delta_{ij}$ in $\\mathbb{R}^{q}$ preserve the rank order of $d_{ij}$ as closely as possible. The configuration is optimized by minimizing **stress**:\n\n$$\n\\arg\\min_{\\mathbf{Y}_{(m+2) \\times q}} \\;\\; \\sqrt{\\frac{\\sum_{i<j} (\\delta_{ij} - \\hat{d}_{ij})^2}{\\sum_{i<j} \\delta_{ij}^2}}\n$$\n\nwhere $\\delta_{ij}$ is the Euclidean distance between the rows of $\\mathbf{Y}$ and $\\hat{d}_{ij}$ are the disparities \u2014 fitted distances produced by an isotonic regression that is monotonic along the rank order of $d_{ij}$ and as close as possible to $\\delta_{ij}$ in least-squares sense. The iterative optimization alternates between updating $\\mathbf{Y}$ (gradient descent on stress) and refitting $\\hat{d}_{ij}$ (isotonic regression) until stress converges.\n\nOnce the ordination configuration $\\mathbf{Y}_{(m+2) \\times q}$ is finalized, the two pole rows $\\mathbf{y}_{\\mathrm{ref}}$ and $\\mathbf{y}_{\\mathrm{deg}}$ define a directed axis in $\\mathbb{R}^{q}$. Each site $i$ is projected onto this axis, and the projection coefficient becomes its ZCI value:\n\n$$\n\\mathrm{ZCI}_i = \\frac{(\\mathbf{y}_i - \\mathbf{y}_{\\mathrm{ref}}) \\cdot (\\mathbf{y}_{\\mathrm{deg}} - \\mathbf{y}_{\\mathrm{ref}})}{\\|\\mathbf{y}_{\\mathrm{deg}} - \\mathbf{y}_{\\mathrm{ref}}\\|^2}\n$$\n\nThe scaling is chosen so that $\\mathrm{ZCI}_i = 0$ at the reference pole and $\\mathrm{ZCI}_i = 1$ at the degraded pole. Values inside $[0, 1]$ place a site along the gradient between the two poles; values outside this interval indicate sites that are more reference-like or more degraded-like than the chosen endpoints. The end-to-end transformation per community type is:\n\n$$\n\\mathbf{T}_{(m \\times p)} \\xrightarrow{\\text{Bray-Curtis} + \\text{NMDS}} \\mathbf{Y}_{(m+2) \\times q} \\xrightarrow{\\text{pole projection}} \\mathrm{ZCI}_{(m \\times 1)}\n$$\n\n**Expected Contributions**\n\n- A within-type **Bray-Curtis dissimilarity matrix** $\\mathbf{D}^{BC}_{(m+2) \\times (m+2)}$ for each of the $k$ community types, encoding ecological dissimilarity among real sites and the two hypothetical poles.\n- A within-type **NMDS ordination configuration** $\\mathbf{Y}_{(m+2) \\times q}$ for each community type, in which Euclidean distance between rows reflects the rank-preserved ecological dissimilarity, providing a valid geometric ground for projection-based scoring.\n- A **stress diagnostic** per community type that documents how faithfully the low-dimensional configuration preserves the rank structure of the original $\\mathbb{R}^{16}$ dissimilarities.\n- A single **ZCI value** per real site, anchored to the reference and degraded poles within its assigned community type, providing the site-level compositional indicator that downstream chapters consume.\n\n**List of Frameworks**\n\nThis chapter contains three frameworks that together deliver the within-type ZCI:\n\n- **Framework 1 \u2014 Bray-Curtis dissimilarity matrix with reference and degraded poles.** Within each community type, augments the taxa matrix with two hypothetical composition endpoints and computes the pairwise Bray-Curtis dissimilarity matrix $\\mathbf{D}^{BC}_{(m+2) \\times (m+2)}$, providing the ecologically meaningful dissimilarity input that the ordination step will operate on.\n\n- **Framework 2 \u2014 NMDS ordination of the augmented dissimilarity matrix.** Within each community type, applies non-metric multidimensional scaling to $\\mathbf{D}^{BC}$ to produce a $q$-dimensional Euclidean configuration $\\mathbf{Y}_{(m+2) \\times q}$ that preserves the rank order of the original dissimilarities, restoring geometric tractability for the projection step.\n\n- **Framework 3 \u2014 ZCI construction by projection onto the pole-defined axis.** Within each community type, projects each site's ordination coordinates onto the axis connecting the reference and degraded pole positions in $\\mathbb{R}^{q}$, producing a single ZCI value per site that quantifies its position along the reference-to-degraded gradient."}, {"cell_type": "markdown", "source": "## Framework 1: Taxa Bray-Curtis Dissimilarity Matrix with Poles (Endpoints)\n\nOn the taxa data, Bray-Curtis dissimilarity can quantify the distance between site $i$ and site $j$ with their abundance data of taxon $k$ meaningfully and aviod the **double-zero problem**.\n\n**Question/Motivation**:\n\nEuclidean distance (dissimilarity) is not suitable for measureing difference of two sites in community composition,\nespecially the **shared absence** of some taxa in both sites does not mean they are ecologically similar.\nIt raises the need of a measure that handles the double-zero problem and focuses on the observed shared abundance and abundance differences among sites.\n\n**Methods and Steps**:\n\nBray-Curtis is the dissimilarity measure to quantify the dissimilarity in terms of taxa composition between two sites. It focuses on shared abundance and abundance differences, not on shared absences. It tells out of the total abundance observed (first) across the two sites, how much is not shared (second) or needs to be redistributed to make them similar?\n\nSpecifically, the Bray-Curtis dissimilarity between site $i$ and site $j$ in terms of $k$ taxa is calculated as:\n\n$$\nBC_{ij} = \\frac{\\sum_{k=1}^{16} |x_{ik} - x_{jk}|}{\\sum_{k=1}^{16} (x_{ik} + x_{jk})}\n$$\n\n| $BC_{ij}$ value | Meaning for sites $i$ and $j$ |\n|:-----------------:|:--------:|\n| 0 | identical composition |\n| close to 0 | very similar composition |\n| close to 1 | very different composition |\n| 1 | no shared taxa/abundance |\n\nBray-Curtis can be applied on the proportional octave-transformed taxa data, which is the raw taxa format in our study. Meanwhile, the bounded values between 0 and 1 scale is useful for ordination and ecological interpretation.\nExcept the soly similarities between sites, setting two endpoints as reference and degraded community patterns can assign ecological meanings to the distance direction, which augments the taxa matrix from $m$ sites to $m + 2$.\n\n**Results**:\n\nApplying Bray-Curtis dissimilarity for all pairs of $(m + 2)$ sites, it produces a Bray-Curtis dissimilarity matrix $D_{(m+2) \\times (m+2)}$ of all sites.\n\n$$\n\\mathbf{D}_{(m+2) \\times (m+2)}\n=\n\n\\begin{bmatrix}\nBC_{m \\times m} & BC_{m \\times 2}\\\\\nBC_{2 \\times m} & BC_{2 \\times 2} \\\\\n\\end{bmatrix}\n\n=\n\\begin{bmatrix}\nBC_{11} & BC_{12} & \\cdots  & BC_{1E_{ref}} & BC_{1E_{deg}} \\\\\nBC_{21} & BC_{22} & \\cdots  & BC_{2E_{ref}} & BC_{2E_{deg}} \\\\\n\\vdots & \\vdots & \\ddots & \\vdots & \\vdots \\\\\nBC_{E_{ref}1} & BC_{E_{ref}2} & \\cdots  & BC_{E_{ref}E_{ref}} & BC_{E_{ref}E_{deg}} \\\\\nBC_{E_{deg}1} & BC_{E_{deg}2} & \\cdots & BC_{E_{deg}E_{ref}} & BC_{E_{deg}E_{deg}} \\\\\n\\end{bmatrix}\n$$\n\n\nTherefore, the transformation from original taxa abundance data with two endpoints to the Bray-Curtis dissimilarity matrix can be summarized as:\n\n$$\n\\mathbf{X}_{m \\times p}\n\\xrightarrow{\\text{Augment}}\n\\mathbf{X}_{(m+2) \\times p}\n\\xrightarrow{\\text{Bray-Curtis}}\n\\mathbf{D}_{(m+2) \\times (m+2)}\n$$"}, {"cell_type": "markdown", "source": "### Computation Process\n\n#### Inputs\n\n**Metadata**\n- taxa data $\\mathbf{T}$\n  \n**Artifacts**\n\n- **table** : posterior probabilities of community types of sites\n  - rows: $(\\text{Integrated Code}, P_{i, posterior} = C_1, P_{i, posterior} = C_2, P_{i, posterior} = C_3)$\n  - shape: $(310, 4)$\n\n- **table**: contamination scores of sites\n  - rows: $(\\text{Integrated Code}, PC_1 \\text{ scores}, \\ldots, PC_5 \\text{ scores}, f_{sum}(), f_{max}())$\n  - shape: $(310, 8)$\n\n#### Process\n\n**Transformations**\n\n- *None*: $\\mathbf{T}$ is already in octave format.\n\n**Bridging tools**\n\n- *Boolean filter for posterior probabilities*\n  - It filters sites with confident community-type assignment.\n\n- *Rank-based subset selector*\n  - It selects sites according to ranked values of contamination scores.\n\n**Modeling tools**\n\n- *Averaging operator*\n  - It computes the centroid or mean composition vector from selected samples.\n\n- *Bray-Curtis dissimilarity*\n  - It computes pairwise compositional dissimilarities among sites and endpoints.\n\n**Interpreters**\n\n- *Bray-Curtis dissimilarity matrix*\n\n  - It is a $D_{(m+2) \\times (m+2)}$ matrix quantifying compositional dissimilarities among all pairs of real sites and the two endpoints.\n\n\n**Demonstration Outputs**:\n\n\n$$\n\\mathbf{D}_{BC}^{(m+2)\\times(m+2)}\n=\n\\begin{bmatrix}\n0 \n& d_{12} \n& \\cdots \n& d_{1m} \n& d_{1,\\mathrm{ref}} \n& d_{1,\\mathrm{deg}} \\\\\n\nd_{21} \n& 0 \n& \\cdots \n& d_{2m} \n& d_{2,\\mathrm{ref}} \n& d_{2,\\mathrm{deg}} \\\\\n\n\\vdots \n& \\vdots \n& \\ddots \n& \\vdots \n& \\vdots \n& \\vdots \\\\\n\nd_{m1} \n& d_{m2} \n& \\cdots \n& 0 \n& d_{m,\\mathrm{ref}} \n& d_{m,\\mathrm{deg}} \\\\\n\nd_{\\mathrm{ref},1} \n& d_{\\mathrm{ref},2} \n& \\cdots \n& d_{\\mathrm{ref},m} \n& 0 \n& d_{\\mathrm{ref},\\mathrm{deg}} \\\\\n\nd_{\\mathrm{deg},1} \n& d_{\\mathrm{deg},2} \n& \\cdots \n& d_{\\mathrm{deg},m} \n& d_{\\mathrm{deg},\\mathrm{ref}} \n& 0\n\\end{bmatrix}\n$$"}, {"cell_type": "markdown", "source": "## Framework 2: NMDS Ordination of Bray-Curtis Dissimilarity Matrix\n\n**Question/Motivation**:\n\n**Methods/Steps**:\n\n**Results**:"}];
