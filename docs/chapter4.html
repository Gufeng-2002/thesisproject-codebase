    window.PAGE_ID = "chapter4";
    window.cells = [{"cell_type": "markdown", "source": "# Chapter 4: Zoobenthic Community Indicator from Bray-Curtis Ordination Within Reference Community Types\n\n**Objectives**\n\nWithin each of the $k$ reference community types identified in Chapter 3, summarize the raw $\\mathbb{R}^{16}$ multivariate taxa records into a single, interpretable site-level **zoobenthic community indicator (ZCI)** that quantifies where each site sits along a reference-to-degraded compositional gradient. The construction proceeds in three connected steps: an ecologically meaningful dissimilarity measure (Bray-Curtis) on the raw taxa records, a non-parametric ordination (NMDS) that returns the sites to a Euclidean configuration, and a projection-based scoring step that converts ordination coordinates into the ZCI.\n\n**Reasons**\n\nTwo competing requirements pull the analysis in opposite directions. On one hand, **ecological realism** demands a dissimilarity measure that handles the double-zero problem, weights shared abundance and abundance differences appropriately, and stays bounded \u2014 properties that Euclidean distance on the raw $\\mathbb{R}^{16}$ taxa records fails to satisfy. Applying Euclidean distance directly to the 16-dimensional taxa space produces numerical values without ecological meaning.\n\nOn the other hand, **geometric tractability** demands that the configuration in which sites live supports linear operations \u2014 projection onto a reference-to-degraded axis, distance ratios, and other constructions that downstream indicator modeling depends on. Ecologically appropriate dissimilarity measures such as Bray-Curtis are typically **non-metric**: they violate the triangle inequality, so the pairwise dissimilarity matrix cannot be embedded into any Euclidean space without distortion. Direct ordination by linear methods (e.g., PCoA) on a non-metric matrix produces negative eigenvalues and geometrically meaningless axes, breaking the connection between the ordination output and the ecological dissimilarity it was supposed to encode.\n\nA further requirement is **interpretability of direction**. The multivariate composition of a site has no inherent \"good\" or \"bad\" orientation; without external anchoring, any ordination axis is free to point in either direction and its sign carries no ecological meaning. To convert the ordination into an indicator that ranks sites from reference-like to degraded-like, the chapter introduces two hypothetical composition endpoints \u2014 a **reference pole** $E_{\\mathrm{ref}}$ and a **degraded pole** $E_{\\mathrm{deg}}$ \u2014 that impose external knowledge about the direction of ecological degradation onto the ordination space.\n\nThe chapter resolves the geometric conflict by **decoupling** the requirements. Ecological realism is handled at the dissimilarity step (Bray-Curtis on the raw taxa records). Euclidean geometry is recovered at the ordination step through a non-parametric method (NMDS) that preserves the *rank order* of the original dissimilarities rather than their numerical values. Rank preservation absorbs the non-metric character of Bray-Curtis without forcing the ordination to inherit it, so the resulting $\\mathbb{R}^{q}$ configuration is genuinely Euclidean. Directional interpretability is then handled at the scoring step through projection onto the axis defined by the two poles in the ordination space.\n\n**How**\n\nThe procedure is applied $k$ times \u2014 once within each reference community type identified in Chapter 3 \u2014 so that environmental confounding is held constant within each application and the ZCI reflects only within-type compositional variation along the reference-to-degraded gradient.\n\nIn each community type, two hypothetical composition vectors are constructed: a reference pole $E_{\\mathrm{ref}}$ and a degraded pole $E_{\\mathrm{deg}}$. These poles augment the within-type taxa matrix from $m$ sites to $m+2$. Bray-Curtis dissimilarity is then computed pairwise across all $(m+2)$ rows, producing the augmented dissimilarity matrix:\n\n$$\n\\mathbf{T}_{(m \\times p)} \\xrightarrow{\\text{add poles}} \\mathbf{T}_{((m+2) \\times p)} \\xrightarrow{\\text{Bray-Curtis}} \\mathbf{D}^{BC}_{(m+2) \\times (m+2)}\n$$\n\nThe $\\binom{m+2}{2}$ pairwise dissimilarities $d_{ij}$ from the upper triangle of $\\mathbf{D}^{BC}$ are ranked. NMDS then searches for an ordination configuration $\\mathbf{Y}_{(m+2) \\times q}$ such that the Euclidean distances $\\delta_{ij}$ in $\\mathbb{R}^{q}$ preserve the rank order of $d_{ij}$ as closely as possible. The configuration is optimized by minimizing **stress**:\n\n$$\n\\arg\\min_{\\mathbf{Y}_{(m+2) \\times q}} \\sqrt{\\frac{\\sum_{i<j} (\\delta_{ij} - \\hat{d}_{ij})^2}{\\sum_{i<j} \\delta_{ij}^2}}\n$$\n\nwhere $\\delta_{ij}$ is the Euclidean distance between the rows of $\\mathbf{Y}$ and $\\hat{d}_{ij}$ are the disparities \u2014 fitted distances produced by an isotonic regression that is monotonic along the rank order of $d_{ij}$ and as close as possible to $\\delta_{ij}$ in least-squares sense. The iterative optimization alternates between updating $\\mathbf{Y}$ (gradient descent on stress) and refitting $\\hat{d}_{ij}$ (isotonic regression) until stress converges.\n\nOnce the ordination configuration $\\mathbf{Y}_{(m+2) \\times q}$ is finalized, the two pole rows $\\mathbf{y}_{\\mathrm{ref}}$ and $\\mathbf{y}_{\\mathrm{deg}}$ define a directed axis in $\\mathbb{R}^{q}$. Each site $i$ is projected onto this axis, and the projection coefficient becomes its ZCI value:\n\n$$\n\\mathrm{ZCI}_i = \\frac{(\\mathbf{y}_i - \\mathbf{y}_{\\mathrm{ref}}) \\cdot (\\mathbf{y}_{\\mathrm{deg}} - \\mathbf{y}_{\\mathrm{ref}})}{\\|\\mathbf{y}_{\\mathrm{deg}} - \\mathbf{y}_{\\mathrm{ref}}\\|^2}\n$$\n\nThe scaling is chosen so that $\\mathrm{ZCI}_i = 0$ at the reference pole and $\\mathrm{ZCI}_i = 1$ at the degraded pole. Values inside $[0, 1]$ place a site along the gradient between the two poles; values outside this interval indicate sites that are more reference-like or more degraded-like than the chosen endpoints. The end-to-end transformation per community type is:\n\n$$\n\\mathbf{T}_{(m \\times p)} \\xrightarrow{\\text{Bray-Curtis} + \\text{NMDS}} \\mathbf{Y}_{(m+2) \\times q} \\xrightarrow{\\text{pole projection}} \\mathrm{ZCI}_{(m \\times 1)}\n$$\n\n**Expected Contributions**\n\n- A within-type **Bray-Curtis dissimilarity matrix** $\\mathbf{D}^{BC}_{(m+2) \\times (m+2)}$ for each of the $k$ community types, encoding ecological dissimilarity among real sites and the two hypothetical poles.\n- A within-type **NMDS ordination configuration** $\\mathbf{Y}_{(m+2) \\times q}$ for each community type, in which Euclidean distance between rows reflects the rank-preserved ecological dissimilarity, providing a valid geometric ground for projection-based scoring.\n- A **stress diagnostic** per community type that documents how faithfully the low-dimensional configuration preserves the rank structure of the original $\\mathbb{R}^{16}$ dissimilarities.\n- A single **ZCI value** per real site, anchored to the reference and degraded poles within its assigned community type, providing the site-level compositional indicator that downstream chapters consume.\n\n**List of Frameworks**\n\nThis chapter contains three frameworks that together deliver the within-type ZCI:\n\n- **Framework 1 \u2014 Bray-Curtis dissimilarity matrix with reference and degraded poles.** Within each community type, augments the taxa matrix with two hypothetical composition endpoints and computes the pairwise Bray-Curtis dissimilarity matrix $\\mathbf{D}^{BC}_{(m+2) \\times (m+2)}$, providing the ecologically meaningful dissimilarity input that the ordination step will operate on.\n\n- **Framework 2 \u2014 NMDS ordination of the augmented dissimilarity matrix.** Within each community type, applies non-metric multidimensional scaling to $\\mathbf{D}^{BC}$ to produce a $q$-dimensional Euclidean configuration $\\mathbf{Y}_{(m+2) \\times q}$ that preserves the rank order of the original dissimilarities, restoring geometric tractability for the projection step.\n\n- **Framework 3 \u2014 ZCI construction by projection onto the pole-defined axis.** Within each community type, projects each site's ordination coordinates onto the axis connecting the reference and degraded pole positions in $\\mathbb{R}^{q}$, producing a single ZCI value per site that quantifies its position along the reference-to-degraded gradient."}, {"cell_type": "markdown", "source": "## Framework 1: Taxa Bray-Curtis Dissimilarity Matrix with Poles (Endpoints)\n\nWith the octave-transformed taxa records in each community type, Bray-Curtis dissimilarity measures the ecological distance between site $i$ and site $j$ at the community level, and especially avoids the **double-zero problem**.\n\n**Questions and Motivations**\n\nEuclidean distance is straightforward and widely used in many quantitative contexts, but the philosophy behind its calculation becomes ecologically invalid when applied to taxa abundance data.\n\n> The major issue is the **double-zero problem**: *a shared absence of a taxon in two sites does not indicate they are similar in community composition.* In other words, there are many reasons \u2014 as significant as ecological dissimilarity \u2014 that two sites both lack a certain taxon (e.g., the taxon falls below the detection limit at both, or both sites lie outside the taxon's habitat range entirely). When a taxon is present at both sites, however, the most natural explanation is that the two sites share the ecological conditions that allow the taxon to thrive.\n\nEuclidean distance treats shared zeros symmetrically with shared abundances \u2014 both contribute equally to making two sites appear \"close.\" For community composition data, this is ecologically misleading: it recognizes high similarity between sites that have close numerical values without distinguishing whether that closeness comes from shared *presence* (ecologically informative) or shared *absence* (ecologically ambiguous).\n\nA second motivation concerns **directional interpretability**. Even when an appropriate dissimilarity measure is in place, the resulting pairwise distances quantify only how *different* two sites are \u2014 not *in which direction* that difference points along an ecological gradient. To prepare the ground for the indicator construction in later frameworks, the dissimilarity space needs to be anchored to externally meaningful endpoints \u2014 a reference composition and a degraded composition \u2014 so that subsequent ordination axes inherit a direction that maps onto ecological degradation.\n\n**Methodology**\n\nBray-Curtis dissimilarity is chosen to quantify the differences in taxa composition between two sites. It focuses on shared abundance and abundance differences, ignoring shared absences. It uses the total abundance recorded across both sites and answers the question: *out of the total observed, how much is not shared, or needs to be redistributed to make the two sites identical?*\n\nSpecifically, the Bray-Curtis dissimilarity between site $i$ and site $j$ across the $p = 16$ taxa is calculated as:\n\n$$\nBC_{ij} = \\frac{\\sum_{k=1}^{p} |x_{ik} - x_{jk}|}{\\sum_{k=1}^{p} (x_{ik} + x_{jk})}\n$$\n\n| $BC_{ij}$ value | Meaning for sites $i$ and $j$ |\n|:-----------------:|:--------:|\n| $0$ | identical composition |\n| $\\approx 0$ | very similar composition |\n| $\\approx 1$ | very different composition |\n| $1$ | no shared taxa/abundance |\n\nBray-Curtis is well-suited to the proportional octave-transformed taxa data stored in $\\mathbf{T}$. The output is bounded between 0 and 1, which is convenient both for ordination diagnostics and for ecological interpretation. One important property to flag: Bray-Curtis is generally **non-metric** \u2014 it can violate the triangle inequality \u2014 which means the resulting dissimilarity matrix cannot be embedded in Euclidean space without distortion. This property motivates the choice of NMDS rather than a linear ordination in Framework 2.\n\nTo impose external constraints and bring ecological meaning to the direction of dissimilarities between sites, two hypothetical endpoints representing reference and degraded community patterns are constructed and appended to the within-type taxa matrix $\\mathbf{T}_{C_k}$ of each community type $C_k$. These endpoints play the roles of *origins* and *destinations* in the ordination space \u2014 forming the ecological gradient onto which real sites are projected in later frameworks.\n\nThe reference pole $E_{\\mathrm{ref}}^{(k)}$ for community type $C_k$ is constructed as the centroid of the taxa profiles of low-contamination sites within that cluster; the degraded pole $E_{\\mathrm{deg}}^{(k)}$ is constructed as the centroid of the taxa profiles of high-contamination sites within that cluster. The contamination ranking is taken from the SumRel (or MaxRel) contamination score artifact produced in Chapter 2, and cluster membership is taken from the plausible-class assignments produced in Chapter 3.\n\n**Conceptual Steps**\n\nThe procedure runs once per community type $C_k$, with $k = 1, 2, \\dots, K$ (where $K$ is the number of reference community types from Chapter 3). For each $C_k$:\n\n1. **Select within-type sites.** From the merged dataset, retain the rows whose plausible-class set $\\hat{\\mathcal{S}}_i$ includes $C_k$. Let the within-type taxa matrix be $\\mathbf{T}_{C_k} \\in \\mathbb{R}^{m_k \\times p}$ with $p = 16$.\n\n2. **Construct the reference pole $E_{\\mathrm{ref}}^{(k)}$.** Rank the within-type sites by their contamination score in ascending order. Select the lowest $n_{\\mathrm{ref}}$ sites and compute the centroid of their taxa profiles:\n\n   $$\n   E_{\\mathrm{ref}}^{(k)} = \\frac{1}{n_{\\mathrm{ref}}} \\sum_{i \\in \\text{lowest } n_{\\mathrm{ref}}} \\mathbf{x}_i\n   $$\n\n3. **Construct the degraded pole $E_{\\mathrm{deg}}^{(k)}$.** Mirror the above: rank the within-type sites by their contamination score in descending order, select the highest $n_{\\mathrm{deg}}$ sites, and compute the centroid of their taxa profiles:\n\n   $$\n   E_{\\mathrm{deg}}^{(k)} = \\frac{1}{n_{\\mathrm{deg}}} \\sum_{i \\in \\text{highest } n_{\\mathrm{deg}}} \\mathbf{x}_i\n   $$\n\n4. **Augment the within-type taxa matrix.** Append $E_{\\mathrm{ref}}^{(k)}$ and $E_{\\mathrm{deg}}^{(k)}$ as two additional rows to $\\mathbf{T}_{C_k}$, producing the augmented matrix $\\mathbf{T}_{C_k}^{+} \\in \\mathbb{R}^{(m_k + 2) \\times p}$:\n\n   $$\n   \\mathbf{T}_{C_k} \\xrightarrow{\\text{add poles}} \\mathbf{T}_{C_k}^{+}\n   $$\n\n5. **Compute the pairwise Bray-Curtis dissimilarity matrix.** Apply the Bray-Curtis formula to every pair of rows in $\\mathbf{T}_{C_k}^{+}$, producing the symmetric augmented dissimilarity matrix:\n\n   $$\n   \\mathbf{D}_{C_k}^{BC} \\in \\mathbb{R}^{(m_k + 2) \\times (m_k + 2)}\n   $$\n\n   where the diagonal is zero, and the last two rows and columns encode the dissimilarities between real sites and the two poles.\n\nThe end-to-end transformation per community type is:\n\n$$\n\\mathbf{T}_{C_k}\n\\xrightarrow{\\text{add poles}}\n\\mathbf{T}_{C_k}^{+}\n\\xrightarrow{\\text{Bray-Curtis}}\n\\mathbf{D}_{C_k}^{BC}\n$$\n\n**Expected Conclusions**\n\n- Within each community type $C_k$, the Bray-Curtis dissimilarity matrix $\\mathbf{D}_{C_k}^{BC}$ encodes pair"}, {"cell_type": "markdown", "source": "### Computation Process\n\n#### Inputs\n\n**Metadata**\n\n- taxa data $\\mathbf{T}$\n\n**Artifacts**\n\n- table <span style=\"color: blue;\">A1</span>: stressor values with contamination scores\n  - rows: $(\\text{site ID}, \\text{stressor value}_1, \\ldots, \\text{stressor value}_m, \\text{SumRel}, \\text{MaxRel})$\n  - shape: $(310 \\times (m+2))$\n  - source: output artifact from Chapter 2, Framework 1 (contamination assessment)\n\n- table <span style=\"color: blue;\">A5</span>: full-site table with posterior probabilities and plausible-class memberships\n  - rows: $(\\text{site ID}, P(C_1 \\mid \\mathbf{e}_i), P(C_2 \\mid \\mathbf{e}_i), P(C_3 \\mid \\mathbf{e}_i), \\hat{\\mathcal{S}}_i)$\n  - shape: $(310 \\times 5)$\n  - source: output artifact from Chapter 3, Framework 3 (environmental classifier)\n\n#### Process\n\n**Transformations**\n\n- none; $\\mathbf{T}$ is already in proportional octave format and supports Bray-Curtis dissimilarity directly.\n\n**Bridging tools**\n\n- *cluster-membership selector*\n  - It accepts the plausible-class assignments from table A5 and a target community type $C_k$, then returns the subset of sites whose plausible-class set $\\hat{\\mathcal{S}}_i$ contains $C_k$. The output is the within-type site list of size $m_k$.\n\n- *within-type matrix slicer*\n  - It accepts the within-type site list and slices the corresponding rows from the taxa data $\\mathbf{T}$ and the contamination score vector $\\mathbf{c}$ (from table A1), producing $\\mathbf{T}_{C_k} \\in \\mathbb{R}^{m_k \\times p}$ and $\\mathbf{c}_{C_k} \\in \\mathbb{R}^{m_k}$.\n\n- *contamination-ranked subset selector*\n  - It accepts the within-type contamination score vector $\\mathbf{c}_{C_k}$ and a subset size $n$, then returns the indices of the $n$ lowest-scoring sites (for the reference pole) or the $n$ highest-scoring sites (for the degraded pole).\n\n- *pole appender*\n  - It accepts the within-type taxa matrix $\\mathbf{T}_{C_k}$ and the two pole vectors $E_{\\mathrm{ref}}^{(k)}$ and $E_{\\mathrm{deg}}^{(k)}$, appending them as two additional rows to produce the augmented matrix $\\mathbf{T}_{C_k}^{+} \\in \\mathbb{R}^{(m_k + 2) \\times p}$.\n\n**Modeling**\n\n- *centroid operator*\n  - It accepts a set of taxa-profile rows from $\\mathbf{T}_{C_k}$ and computes their column-wise mean, producing a single composition vector in $\\mathbb{R}^{p}$. Applied separately to the lowest-contamination subset to construct $E_{\\mathrm{ref}}^{(k)}$ and to the highest-contamination subset to construct $E_{\\mathrm{deg}}^{(k)}$.\n\n- *Bray-Curtis dissimilarity constructor*\n  - It accepts the augmented within-type matrix $\\mathbf{T}_{C_k}^{+}$ and computes the pairwise Bray-Curtis dissimilarity between every pair of rows using\n  $$\n  BC_{ij} = \\frac{\\sum_{k=1}^{p} |x_{ik} - x_{jk}|}{\\sum_{k=1}^{p} (x_{ik} + x_{jk})}\n  $$\n  outputting the symmetric matrix $\\mathbf{D}_{C_k}^{BC} \\in \\mathbb{R}^{(m_k + 2) \\times (m_k + 2)}$ with zeros on the diagonal.\n\n**Interpreters**\n\n- *pole-distance summarizer*\n  - It accepts the dissimilarity matrix $\\mathbf{D}_{C_k}^{BC}$ and extracts the two columns corresponding to $E_{\\mathrm{ref}}^{(k)}$ and $E_{\\mathrm{deg}}^{(k)}$, reporting per-site dissimilarities to both poles. Used to verify that real sites span the gradient between the two poles rather than clustering at one end.\n\n- *triangle-inequality diagnostic*\n  - It accepts the dissimilarity matrix $\\mathbf{D}_{C_k}^{BC}$ and counts the proportion of triples $(i, j, l)$ for which $d_{il} > d_{ij} + d_{jl}$. The proportion measures how far the matrix deviates from being metric and motivates the use of NMDS over a linear ordination in Framework 2.\n\n#### Outputs\n\n**Results**\n\n- table: per-cluster pole composition vectors\n  - rows: $(\\text{community type } C_k, \\text{pole type}, \\text{taxon}_1, \\ldots, \\text{taxon}_{16})$\n  - shape: $(2K \\times (p + 2))$\n\n- table: per-site dissimilarities to the two poles within each community type\n  - rows: $(\\text{site ID}, C_k, BC_{i, E_{\\mathrm{ref}}^{(k)}}, BC_{i, E_{\\mathrm{deg}}^{(k)}})$\n  - shape: $(\\sum_k m_k) \\times 4$\n\n- table': triangle-inequality violation rates per community type\n  - rows: $(\\text{community type } C_k, \\text{number of triples}, \\text{violations}, \\text{violation rate})$\n  - shape: $(K \\times 4)$\n\n- figure: histogram of pairwise Bray-Curtis dissimilarities within each community type\n  - x-axis: Bray-Curtis dissimilarity value, ticks from 0 to 1\n  - y-axis: count of site pairs\n  - panels: one panel per community type $C_k$\n  - annotations: vertical lines marking the dissimilarity between the two poles, $BC_{E_{\\mathrm{ref}}^{(k)}, E_{\\mathrm{deg}}^{(k)}}$\n\n**Artifacts**\n\n- table <span style=\"color: blue;\">A6</span>: augmented within-type taxa matrices with poles appended\n  - rows: $(\\text{site ID or pole label}, C_k, \\text{taxon}_1, \\ldots, \\text{taxon}_{16})$\n  - shape: $(\\sum_k (m_k + 2)) \\times (p + 2)$\n\n- artifact <span style=\"color: blue;\">A7</span>: per-community-type Bray-Curtis dissimilarity matrices $\\{\\mathbf{D}_{C_1}^{BC}, \\mathbf{D}_{C_2}^{BC}, \\ldots, \\mathbf{D}_{C_K}^{BC}\\}$\n  - structure: $K$ symmetric matrices, the $k$-th of shape $(m_k + 2) \\times (m_k + 2)$, indexed by within-type site IDs plus the two pole labels $\\{E_{\\mathrm{ref}}^{(k)}, E_{\\mathrm{deg}}^{(k)}\\}$\n\n#### Demonstration Outputs\n\nA typical Bray-Curtis dissimilarity matrix for one community type takes the form:\n\n$$\n\\mathbf{D}_{C_k}^{BC}\n=\n\\begin{bmatrix}\n0 & d_{12} & \\cdots & d_{1, m_k} & d_{1, \\mathrm{ref}} & d_{1, \\mathrm{deg}} \\\\\nd_{21} & 0 & \\cdots & d_{2, m_k} & d_{2, \\mathrm{ref}} & d_{2, \\mathrm{deg}} \\\\\n\\vdots & \\vdots & \\ddots & \\vdots & \\vdots & \\vdots \\\\\nd_{m_k, 1} & d_{m_k, 2} & \\cdots & 0 & d_{m_k, \\mathrm{ref}} & d_{m_k, \\mathrm{deg}} \\\\\nd_{\\mathrm{ref}, 1} & d_{\\mathrm{ref}, 2} & \\cdots & d_{\\mathrm{ref}, m_k} & 0 & d_{\\mathrm{ref}, \\mathrm{deg}} \\\\\nd_{\\mathrm{deg}, 1} & d_{\\mathrm{deg}, 2} & \\cdots & d_{\\mathrm{deg}, m_k} & d_{\\mathrm{deg}, \\mathrm{ref}} & 0\n\\end{bmatrix}\n$$\n\nwhere the last two rows and columns encode the ecological dissimilarity of every real site to the reference and degraded poles. These pole-anchored columns are the key inputs to the projection-based ZCI construction in Framework 3."}, {"cell_type": "markdown", "source": "## Framework 2: NMDS Ordination of the Augmented Dissimilarity Matrix\n\nWithin each community type $C_k$, the augmented Bray-Curtis dissimilarity matrix $\\mathbf{D}_{C_k}^{BC}$ from Framework 1 is embedded into a low-dimensional Euclidean configuration through non-metric multidimensional scaling. The resulting configuration provides the geometric ground on which the pole-projection ZCI is constructed in Framework 3.\n\n**Questions and Motivations**\n\nThe augmented dissimilarity matrix $\\mathbf{D}_{C_k}^{BC} \\in \\mathbb{R}^{(m_k + 2) \\times (m_k + 2)}$ encodes ecologically meaningful but **non-metric** pairwise dissimilarities. Two requirements must be satisfied by the ordination step that consumes it.\n\nFirst, the ordination must produce a configuration in **Euclidean space** so that downstream geometric operations \u2014 particularly the pole-projection step in Framework 3 \u2014 are well-defined. Linear ordination methods (PCoA, classical MDS) attempt to preserve the dissimilarity *values* numerically and require the input matrix to be Euclidean-embeddable. Bray-Curtis matrices generally **fail** this requirement: applying PCoA produces negative eigenvalues, imaginary axes, and a configuration whose distances no longer reflect the original dissimilarities. Non-metric multidimensional scaling (NMDS) sidesteps the issue by preserving only the **rank order** of dissimilarities rather than their numerical values. Rank preservation is a strictly weaker constraint than value preservation \u2014 any monotone transformation of the inputs satisfies it \u2014 so NMDS can absorb the non-metric character of Bray-Curtis without distorting the output geometry.\n\nSecond, the ordination must be appropriate for the **mixed pair structure** of the augmented matrix. The dissimilarity matrix contains pairs of three types:\n\n| Pair type | Count | Role in ZCI |\n|---|---|---|\n| Real site to real site | $\\binom{m_k}{2}$ | Shapes the cloud geometry |\n| Real site to pole | $2 m_k$ | Directly determines each site's ZCI value |\n| Pole to pole | $1$ | Determines the length and orientation of the projection axis |\n\n**A caveat worth flagging.** \n\n> Standard NMDS treats every pair as equally important in the stress function. Every squared residual $(\\delta_{ij} - \\hat{d}_{ij})^2$ contributes one unit to the numerator regardless of whether the pair involves a pole or two arbitrary real sites. This default behavior creates a mismatch between **statistical priority** (all pairs equal) and **ecological priority** (pole pairs anchor the gradient that the ZCI is computed along). With $m_k$ moderately large, real-site pairs dominate the stress sum in sheer count, so the optimizer may sacrifice rank fidelity on a few pole-anchored pairs to gain marginal improvements on real-site pairs. The framework adopts standard NMDS for compatibility with established practice and reproducibility, and addresses the mismatch through *post-hoc diagnostics* rather than through a modified loss function: pole-anchored residuals are inspected separately to verify that they are not systematically larger than real-site residuals, and the framework defers to a weighted variant only if the diagnostics reveal the standard approach is failing.\n\n**Methodology**\n\nThe pairwise dissimilarities $d_{ij}$ from the upper triangle of $\\mathbf{D}_{C_k}^{BC}$ are ranked. NMDS searches for an ordination configuration $\\mathbf{Y}_{C_k} \\in \\mathbb{R}^{(m_k + 2) \\times q}$ such that the Euclidean distances $\\delta_{ij} = \\|\\mathbf{y}_i - \\mathbf{y}_j\\|_2$ between rows of $\\mathbf{Y}_{C_k}$ preserve the rank order of $d_{ij}$ as closely as possible.\n\nThe fit is measured by Kruskal's Stress-1:\n\n$$\n\\text{Stress}(\\mathbf{Y}_{C_k}) = \\sqrt{\\frac{\\sum_{i<j} (\\delta_{ij} - \\hat{d}_{ij})^2}{\\sum_{i<j} \\delta_{ij}^2}}\n$$\n\nwhere the disparities $\\hat{d}_{ij}$ are produced by isotonic regression: they are constrained to be monotonically non-decreasing along the rank order of $d_{ij}$, and within that constraint are chosen to minimize the least-squares discrepancy with the current $\\delta_{ij}$. Every pair contributes one squared residual to the numerator with equal weight.\n\nThe optimization alternates two steps until convergence:\n\n1. **Configuration update**: hold the disparities fixed, move points in $\\mathbf{Y}_{C_k}$ by gradient descent on stress, which adjusts the $\\delta_{ij}$ to come closer to the current $\\hat{d}_{ij}$.\n\n2. **Disparity update**: hold $\\mathbf{Y}_{C_k}$ fixed, refit the $\\hat{d}_{ij}$ by isotonic regression on the current $\\delta_{ij}$ along the fixed rank order of $d_{ij}$.\n\nConvergence is declared when the change in stress between iterations falls below a tolerance threshold.\n\n**Choice of dimensionality $q$.** The ordination dimensionality $q$ is chosen separately for each community type by inspecting how stress decreases as $q$ increases. Conventional thresholds are $q = 2$ if Stress $< 0.10$, $q = 3$ if 2D stress is too high but 3D stress is acceptable, and reconsidering the dissimilarity choice if even 3D stress exceeds $0.20$. The same $q$ is not required across community types.\n\n**Non-convexity and restarts.** The stress function is non-convex; the same input data can converge to different local minima depending on the initial configuration. The framework runs the optimization multiple times from perturbed initial configurations, retains the run with the lowest final stress as the finalized ordination, and records the spread of final stress values across runs as a stability diagnostic.\n\n**Pole-anchored residual diagnostic.** After convergence, the residuals $r_{ij} = \\delta_{ij} - \\hat{d}_{ij}$ are stratified by pair type (pole-to-pole, real-to-pole, real-to-real) and the three distributions are compared. The expectation under a well-behaved NMDS fit is that the pole-anchored residuals are comparable to or smaller than real-site residuals in magnitude. If pole-anchored residuals are systematically larger, this signals that the unweighted NMDS is failing to preserve the pole geometry adequately, in which case a weighted variant of NMDS would be the next methodological step. The framework treats this diagnostic as a gate: standard NMDS is accepted if the diagnostic passes, and the framework escalates only if it fails.\n\n**Conceptual Steps**\n\nThe procedure runs once per community type $C_k$, with $k = 1, 2, \\dots, K$. For each $C_k$:\n\n1. **Retrieve the augmented dissimilarity matrix** $\\mathbf{D}_{C_k}^{BC} \\in \\mathbb{R}^{(m_k + 2) \\times (m_k + 2)}$ from Framework 1, with rows indexed by the $m_k$ within-type sites plus the two pole labels $\\{E_{\\mathrm{ref}}^{(k)}, E_{\\mathrm{deg}}^{(k)}\\}$.\n\n2. **Choose target dimensionality** $q$. Run preliminary NMDS at $q = 2$ and $q = 3$ on $\\mathbf{D}_{C_k}^{BC}$; record final stress at each dimensionality. Choose the smallest $q$ that satisfies the stress threshold (Stress $< 0.10$ preferred, $< 0.20$ acceptable). Commit to this $q$ for the final run.\n\n3. **Initialize the configuration** $\\mathbf{Y}_{C_k}^{(0)} \\in \\mathbb{R}^{(m_k + 2) \\times q}$ via classical MDS (PCoA) of the augmented dissimilarity matrix. The PCoA solution provides a sensible starting point even though it is not itself the final ordination.\n\n4. **Run the optimization** by alternating disparity updates (isotonic regression) and configuration updates (gradient descent on stress) until $|\\text{Stress}^{(t+1)} - \\text{Stress}^{(t)}|$ falls below tolerance.\n\n5. **Restart and select best fit.** Repeat Step 4 from $R$ perturbed initial configurations to mitigate non-convexity. Retain the run with the lowest final stress as the ordination $\\mathbf{Y}_{C_k}$, and record the spread of stress values across runs.\n\n6. **Stratify post-convergence residuals** $r_{ij} = \\delta_{ij} - \\hat{d}_{ij}$ into three groups by pair type, summarize each group (median, IQR, max), and inspect a Shepard diagram with points colored by pair type. Confirm that pole-anchored residuals are not systematically larger than real-site residuals.\n\n7. **Record the final pole positions** $\\mathbf{y}_{\\mathrm{ref}}^{(k)}$ and $\\mathbf{y}_{\\mathrm{deg}}^{(k)}$, and the implied projection-axis length $\\|\\mathbf{y}_{\\mathrm{deg}}^{(k)} - \\mathbf{y}_{\\mathrm{ref}}^{(k)}\\|$, for use in Framework 3.\n\n**Expected Conclusions**\n\n- Within each community type $C_k$, NMDS converges to a low-stress configuration $\\mathbf{Y}_{C_k} \\in \\mathbb{R}^{(m_k + 2) \\times q}$ in which Euclidean distances between rows preserve the rank order of the augmented Bray-Curtis dissimilarities. Stress values fall below the conventional acceptability thresholds (Stress $< 0.20$, ideally $< 0.10$).\n\n- The stratified residual diagnostic shows that pole-anchored residuals are comparable in magnitude to real-site residuals, confirming that the standard NMDS is preserving the pole geometry adequately and that the equal-weight default is not biasing the optimizer against the pairs that matter most for the ZCI.\n\n- The two pole positions $\\mathbf{y}_{\\mathrm{ref}}^{(k)}$ and $\\mathbf{y}_{\\mathrm{deg}}^{(k)}$ occupy geometrically extreme positions within the ordination cloud \u2014 most real-site points lie between them along the dominant axis \u2014 confirming that the pole construction in Framework 1 produced sufficiently distinct endpoints to anchor the ZCI gradient.\n\n- The cross-cluster comparison of dimensionality $q_k$ and stress per cluster documents how the geometry of community composition varies in complexity across reference community types: clusters requiring higher $q$ or showing higher stress reflect more multi-axis ecological variation than those that fit cleanly in two dimensions.\n\n- If the residual diagnostic fails \u2014 pole-anchored residuals systematically larger than real-site residuals \u2014 the framework signals the need to escalate to a weighted NMDS variant, in which pole-anchored pairs carry larger weights $w_{ij}$ in the stress function. The current framework commits to standard NMDS by default and treats the weighted variant as a contingency triggered by diagnostic failure."}];
